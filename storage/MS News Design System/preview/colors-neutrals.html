<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  .chip { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; }
  .sw { width: 90px; height: 84px; border-radius: 12px; border: 1px solid rgba(0,0,0,.06); }
  .label { font: 600 12px var(--font-sans); }
  .hex { font: 400 11px var(--font-mono); color: var(--color-muted); }
</style>
</head>
<body>
  <div class="eyebrow">Neutrals · Surface & text</div>
  <div class="row">
    <div class="chip"><div class="sw" style="background:#f8fafc"></div><div class="label">Bg</div><div class="hex">#f8fafc</div></div>
    <div class="chip"><div class="sw" style="background:#ffffff"></div><div class="label">Card</div><div class="hex">#ffffff</div></div>
    <div class="chip"><div class="sw" style="background:#e2e8f0"></div><div class="label">Border</div><div class="hex">#e2e8f0</div></div>
    <div class="chip"><div class="sw" style="background:#f1f5f9"></div><div class="label">Code bg</div><div class="hex">#f1f5f9</div></div>
    <div class="chip"><div class="sw" style="background:#64748b"></div><div class="label">Muted</div><div class="hex">#64748b</div></div>
    <div class="chip"><div class="sw" style="background:#1e293b"></div><div class="label">Text</div><div class="hex">#1e293b</div></div>
  </div>
</body>
</html>

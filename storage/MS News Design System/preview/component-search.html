<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  body { padding: 22px 24px; gap: 14px; }
  .field { position: relative; max-width: 260px; }
  .field input { width: 100%; padding: 9px 36px 9px 12px; border: 1px solid var(--color-border); border-radius: 8px; font: 400 .9rem var(--font-sans); outline: none; transition: border-color .2s; color: var(--color-text); background: var(--color-card); }
  .field input:focus { border-color: var(--color-blue); }
  .field .icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--color-muted); pointer-events: none; }
  .label { font: 600 12px var(--font-sans); color: var(--color-text); margin-bottom: 2px; }
  .group { display: flex; flex-direction: column; gap: 4px; }
</style>
</head>
<body>
  <div class="eyebrow">Search field · only form element in the product</div>
  <div class="row" style="gap:24px;align-items:flex-start">
    <div class="group">
      <div class="label">default</div>
      <div class="field"><input placeholder="키워드 검색..."><span class="icon">🔍</span></div>
    </div>
    <div class="group">
      <div class="label">focus</div>
      <div class="field"><input value="삼성전자" style="border-color:#2563eb"><span class="icon">🔍</span></div>
    </div>
  </div>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  body { padding: 0; background: var(--color-bg); gap: 0; overflow: visible; }
  header { background: var(--color-navy); color: #fff; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 58px; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
  .logo { font: 700 1.15rem var(--font-sans); letter-spacing: -.3px; }
  .logo span { color: #60a5fa; }
  nav a { color: rgba(255,255,255,.8); text-decoration: none; margin-left: 20px; font-size: .9rem; transition: color .15s; }
  nav a:hover, nav a.active { color: #fff; font-weight: 600; }
  .legend { padding: 12px 24px; display:flex; gap:18px; font: 400 11px var(--font-mono); color: var(--color-muted); }
</style>
</head>
<body>
  <header>
    <div class="logo">📰 AI <span>News</span> Daily</div>
    <nav><a class="active" href="#">최신 리포트</a><a href="#">전체 목록</a></nav>
  </header>
  <div class="legend"><span>navy bg · 58px tall · sticky · 2px-8px shadow</span></div>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  body { padding: 24px 28px; background: var(--color-bg); }
  .row { gap: 24px; align-items: stretch; }
  .item { background: var(--color-card); border: 1px solid var(--color-border); border-radius: 12px; padding: 16px 20px; min-width: 180px; display:flex; flex-direction:column; gap:6px; }
  .item.dark { background: var(--color-navy); color: #fff; border-color: transparent; }
  .lbl { font: 600 12px var(--font-sans); color: var(--color-navy); }
  .item.dark .lbl { color: #fff; }
  .v { font: 400 11px var(--font-mono); color: var(--color-muted); }
  .item.dark .v { color: rgba(255,255,255,.7); }
  .shadow-card { box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .shadow-header { box-shadow: 0 2px 8px rgba(0,0,0,.25); }
  .shadow-sticky { box-shadow: 0 2px 12px rgba(0,0,0,.30); }
</style>
</head>
<body>
  <div class="eyebrow">Elevation · sparingly</div>
  <div class="row">
    <div class="item shadow-card"><div class="lbl">card</div><div class="v">0 1px 4px rgba(0,0,0,.06)</div></div>
    <div class="item dark shadow-header"><div class="lbl">header</div><div class="v">0 2px 8px rgba(0,0,0,.25)</div></div>
    <div class="item dark shadow-sticky"><div class="lbl">sticky · app header</div><div class="v">0 2px 12px rgba(0,0,0,.30)</div></div>
  </div>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  body { padding: 20px 24px; }
  .lh-row { display: flex; gap: 16px; }
  .lh { flex: 1; border: 1px solid var(--color-border); border-radius: 8px; padding: 10px 14px; background: var(--color-bg); }
  .lh .label { font-size: 11px; color: var(--color-muted); font-family: var(--font-mono); margin-bottom: 4px; }
  .lh p { font-size: 13px; color: var(--color-text); }
  .lh.tight p { line-height: 1.3; }
  .lh.base p { line-height: 1.7; }
</style>
</head>
<body>
  <div class="eyebrow">Line height · body uses 1.7 for Korean readability</div>
  <div class="lh-row">
    <div class="lh tight">
      <div class="label">tight · 1.3 (headings)</div>
      <p>매일 오전, AI가 정리한 글로벌·국내 뉴스 브리핑. 본문은 1.7 행간을 사용해 한국어 가독성을 확보합니다.</p>
    </div>
    <div class="lh base">
      <div class="label">base · 1.7 (body)</div>
      <p>매일 오전, AI가 정리한 글로벌·국내 뉴스 브리핑. 본문은 1.7 행간을 사용해 한국어 가독성을 확보합니다.</p>
    </div>
  </div>
</body>
</html>

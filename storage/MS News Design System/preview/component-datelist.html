<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  body { padding: 18px 22px; gap: 8px; }
  .h { font: 700 .8rem var(--font-sans); text-transform: uppercase; letter-spacing: .08em; color: var(--color-muted); margin-bottom: 4px; }
  .list { list-style: none; }
  .list li { padding: 7px 0; border-bottom: 1px solid var(--color-border); }
  .list li:last-child { border-bottom: none; }
  .list a { color: var(--color-text); text-decoration: none; font-size: .88rem; display: flex; align-items: center; gap: 6px; }
  .list a:hover { color: var(--color-blue); }
  .list a.active { color: var(--color-blue); font-weight: 600; }
</style>
</head>
<body>
  <div class="h">📅 리포트 날짜</div>
  <ul class="list">
    <li><a class="active">📄 2026.05.14</a></li>
    <li><a>📄 2026.05.13</a></li>
    <li><a>📄 2026.05.12</a></li>
    <li><a>📄 2026.05.11</a></li>
  </ul>
</body>
</html>

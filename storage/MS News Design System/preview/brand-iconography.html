<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  body { padding: 20px 24px; gap: 14px; }
  .row { gap: 14px; flex-wrap: wrap; }
  .chip { display:flex; align-items:center; gap:8px; padding: 8px 12px; background: var(--color-bg); border: 1px solid var(--color-border); border-radius: 8px; font: 500 .82rem var(--font-sans); color: var(--color-text); }
  .chip span.e { font-size: 1.1rem; line-height: 1; }
  .note { font: 400 11px var(--font-mono); color: var(--color-muted); }
</style>
</head>
<body>
  <div class="eyebrow">Iconography · Unicode emoji only · always leading position</div>
  <div class="row">
    <div class="chip"><span class="e">📰</span>Product</div>
    <div class="chip"><span class="e">📅</span>Date</div>
    <div class="chip"><span class="e">🤖</span>AI</div>
    <div class="chip"><span class="e">🌐</span>Global / EN</div>
    <div class="chip"><span class="e">🇰🇷</span>Korean</div>
    <div class="chip"><span class="e">📊</span>Stats</div>
    <div class="chip"><span class="e">🔍</span>Search</div>
    <div class="chip"><span class="e">📚</span>Archive</div>
    <div class="chip"><span class="e">📬</span>Email</div>
    <div class="chip"><span class="e">⚠️</span>Warning</div>
    <div class="chip"><span class="e">📭</span>Empty</div>
    <div class="chip"><span class="e">📋</span>List</div>
  </div>
  <div class="note">No SVG icons, no Lucide, no icon font · OS-rendered color is intentional</div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  .row { gap: 14px; }
  .chip { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; }
  .sw { width: 90px; height: 84px; border-radius: 12px; }
  .label { font: 600 12px var(--font-sans); color: var(--color-text); }
  .hex { font: 400 11px var(--font-mono); color: var(--color-muted); }
</style>
</head>
<body>
  <div class="eyebrow">Brand · Primary</div>
  <div class="row">
    <div class="chip"><div class="sw" style="background:#1e3a5f"></div><div class="label">Navy</div><div class="hex">#1e3a5f</div></div>
    <div class="chip"><div class="sw" style="background:#2563eb"></div><div class="label">Blue</div><div class="hex">#2563eb</div></div>
    <div class="chip"><div class="sw" style="background:#60a5fa"></div><div class="label">Blue · light</div><div class="hex">#60a5fa</div></div>
    <div class="chip"><div class="sw" style="background:#eff6ff;border:1px solid #bfdbfe"></div><div class="label">Blue · 50</div><div class="hex">#eff6ff</div></div>
    <div class="chip"><div class="sw" style="background:#bfdbfe"></div><div class="label">Blue · 200</div><div class="hex">#bfdbfe</div></div>
  </div>
</body>
</html>

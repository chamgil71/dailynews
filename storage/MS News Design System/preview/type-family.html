<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  body { padding: 20px 24px; gap: 8px; }
  .stack { font-family: var(--font-mono); font-size: 12px; color: var(--color-muted); line-height: 1.6; background: var(--color-bg); border: 1px solid var(--color-border); border-radius: 8px; padding: 12px 14px; }
  .name { color: var(--color-navy); font-weight: 700; }
  .sample-row { display: flex; gap: 16px; align-items: baseline; }
  .sample { font-family: var(--font-sans); }
  .ko { font-size: 18px; color: var(--color-text); }
  .en { font-size: 18px; color: var(--color-text); }
  .small { font-size: 11px; color: var(--color-muted); }
</style>
</head>
<body>
  <div class="eyebrow">Font stack</div>
  <div class="stack"><span class="name">--font-sans</span> · "Pretendard", -apple-system, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif</div>
  <div class="sample-row">
    <div class="sample ko">매일 오전 글로벌 뉴스 브리핑</div>
    <div class="sample en">The quick brown fox · 0123456789</div>
  </div>
  <div class="small">Pretendard added as Korean web-font enhancement · system fonts as faithful fallback</div>
</body>
</html>

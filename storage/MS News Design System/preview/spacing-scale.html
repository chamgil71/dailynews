<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  body { padding: 20px 24px; }
  .scale { display: flex; gap: 14px; align-items: flex-end; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { width: 28px; background: var(--color-blue); border-radius: 2px; }
  .v { font: 600 11px var(--font-mono); color: var(--color-text); }
  .t { font: 400 10px var(--font-mono); color: var(--color-muted); }
</style>
</head>
<body>
  <div class="eyebrow">Spacing scale · 8px grid (4 / 8 / 12 / 16 / 20 / 24 / 32 / 36 / 48)</div>
  <div class="scale">
    <div class="step"><div class="bar" style="height:4px"></div><div class="v">4</div><div class="t">--space-1</div></div>
    <div class="step"><div class="bar" style="height:8px"></div><div class="v">8</div><div class="t">--space-2</div></div>
    <div class="step"><div class="bar" style="height:12px"></div><div class="v">12</div><div class="t">--space-3</div></div>
    <div class="step"><div class="bar" style="height:16px"></div><div class="v">16</div><div class="t">--space-4</div></div>
    <div class="step"><div class="bar" style="height:20px"></div><div class="v">20</div><div class="t">--space-5</div></div>
    <div class="step"><div class="bar" style="height:24px"></div><div class="v">24</div><div class="t">--space-6</div></div>
    <div class="step"><div class="bar" style="height:32px"></div><div class="v">32</div><div class="t">--space-8</div></div>
    <div class="step"><div class="bar" style="height:36px"></div><div class="v">36</div><div class="t">--space-9</div></div>
    <div class="step"><div class="bar" style="height:48px"></div><div class="v">48</div><div class="t">--space-12</div></div>
  </div>
</body>
</html>

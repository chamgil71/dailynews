<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  body { padding: 22px 24px; }
  blockquote { border-left: 4px solid var(--color-blue); padding: 8px 16px; background: #eff6ff; border-radius: 0 8px 8px 0; margin: 0; color: var(--color-muted); font: 400 .92rem/1.6 var(--font-sans); }
  blockquote p { margin: 0; }
  .note { font: 400 11px var(--font-mono); color: var(--color-muted); margin-top: 10px; }
</style>
</head>
<body>
  <div class="eyebrow">Blockquote · used for report metadata + pull-quotes</div>
  <blockquote>
    <p>📅 생성일시: 2026-05-14 05:44 KST<br>📊 수집: 총 166건 (EN: 94 / KO: 70) | AI 분석: 40건 | 키워드 매칭: 2건</p>
  </blockquote>
  <div class="note">4px solid blue left bar · radius 0 8 8 0 · #eff6ff bg · muted text</div>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  body { padding: 24px; background: var(--color-bg); justify-content: center; align-items: center; }
  .row { gap: 40px; align-items: center; }
  .state { display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center; padding: 18px 22px; min-width: 200px; }
  .icon { font-size: 2.4rem; line-height: 1; }
  .msg { font: 400 .92rem var(--font-sans); color: var(--color-muted); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--color-border); border-top-color: var(--color-blue); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="row">
    <div class="state"><div class="icon">📭</div><div class="msg">아직 리포트가 없습니다.</div></div>
    <div class="state"><div class="icon">🔍</div><div class="msg">"머스크" 검색 결과 없음</div></div>
    <div class="state"><div class="spinner"></div><div class="msg">리포트를 불러오는 중...</div></div>
  </div>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  body { padding: 0; gap: 0; }
  .logo-row { padding: 20px 24px; background: var(--color-navy); display: flex; align-items: center; gap: 24px; }
  .logo { font: 700 1.35rem var(--font-sans); color: #fff; letter-spacing: -.3px; }
  .logo span { color: #60a5fa; }
  .mark { width: 44px; height: 44px; border-radius: 10px; background: rgba(255,255,255,.08); display:flex; align-items:center; justify-content:center; font-size: 24px; font-weight: 700; color: #60a5fa; }
  .meta { padding: 14px 24px; font: 400 11px var(--font-mono); color: var(--color-muted); display: flex; gap: 18px; }
</style>
</head>
<body>
  <div class="logo-row">
    <div class="mark">N</div>
    <div class="logo">📰 AI <span>News</span> Daily</div>
  </div>
  <div class="meta">
    <span>wordmark only · no real logo in repo</span>
    <span>navy bg · light-blue accent on "News"</span>
  </div>
</body>
</html>

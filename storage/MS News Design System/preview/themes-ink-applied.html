<!doctype html>
<html lang="ko" class="theme-ink">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  body { padding: 0; gap: 0; }
  .hdr { background: var(--color-navy); color: #fff; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font: 700 1rem var(--font-sans); letter-spacing: -.3px; }
  .logo span { color: var(--color-blue-light); }
  nav a { color: rgba(255,255,255,.8); text-decoration: none; margin-left: 16px; font-size: 0.85rem; }
  .body { padding: 16px 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .badge { padding: 3px 10px; border-radius: 20px; font: 500 0.78rem var(--font-sans); background: var(--color-blue-50); color: var(--color-blue); border: 1px solid var(--color-blue-200); }
  .btn { background: var(--color-blue); color: #fff; padding: 8px 18px; border-radius: 8px; font: 600 0.85rem var(--font-sans); border: none; }
  h2 { font-size: 1rem; color: var(--color-blue); margin: 0; padding: 0; border: none; }
</style>
</head>
<body>
  <div class="hdr"><div class="logo">📰 AI <span>News</span> Daily</div><nav><a>최신 리포트</a><a>전체 목록</a></nav></div>
  <div class="body">
    <h2>핵심 이슈 TOP 3</h2>
    <span class="badge">📅 2026.05.14</span>
    <button class="btn">구독 신청하기</button>
  </div>
</body>
</html>

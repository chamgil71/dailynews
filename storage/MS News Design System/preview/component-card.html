<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  body { padding: 20px 24px; background: var(--color-bg); }
  .card { background: var(--color-card); border: 1px solid var(--color-border); border-radius: 12px; padding: 22px 26px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .h1 { font: 700 1.4rem var(--font-sans); color: var(--color-navy); margin-bottom: 6px; }
  .row { gap: 8px; margin-top: 10px; }
  .badge { padding: 3px 10px; border-radius: 20px; font: 500 .75rem var(--font-sans); background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
  .note { font: 400 11px var(--font-mono); color: var(--color-muted); margin-top: 8px; }
</style>
</head>
<body>
  <div class="card">
    <div class="h1">📰 Daily News Brief</div>
    <div class="row">
      <span class="badge">📅 2026년 05월 14일</span>
      <span class="badge">🤖 AI 자동 분석</span>
      <span class="badge">🌐 EN + KO</span>
    </div>
    <div class="note">card · radius 12 · padding 32 36 · border #e2e8f0 · shadow 0 1 4 rgba(0,0,0,.06)</div>
  </div>
</body>
</html>

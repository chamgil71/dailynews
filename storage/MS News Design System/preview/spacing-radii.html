<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  body { padding: 20px 24px; }
  .row { gap: 22px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { width: 72px; height: 72px; background: var(--color-card); border: 1px solid var(--color-border); }
  .lbl { font: 600 12px var(--font-sans); color: var(--color-text); }
  .v { font: 400 11px var(--font-mono); color: var(--color-muted); }
</style>
</head>
<body>
  <div class="eyebrow">Corner radii</div>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:2px"></div><div class="lbl">sm</div><div class="v">4px · code</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl">md</div><div class="v">8px · button/input</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="lbl">lg</div><div class="v">12px · card</div></div>
    <div class="item"><div class="box" style="border-radius:20px;width:120px;height:40px"></div><div class="lbl">pill</div><div class="v">20px · badge/tab</div></div>
    <div class="item"><div class="box" style="border-radius:0 8px 8px 0;border-left:4px solid var(--color-blue);background:var(--color-blue-50)"></div><div class="lbl">asym</div><div class="v">0 8 8 0 · quote</div></div>
  </div>
</body>
</html>

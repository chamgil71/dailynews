<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  body { padding: 18px 22px; gap: 10px; }
  .h { font: 700 .8rem var(--font-sans); text-transform: uppercase; letter-spacing: .08em; color: var(--color-muted); }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
  .stat { text-align: center; padding: 10px; background: var(--color-bg); border-radius: 8px; }
  .num { font: 700 1.4rem var(--font-sans); color: var(--color-blue); line-height: 1; }
  .lbl { font: 400 .72rem var(--font-sans); color: var(--color-muted); margin-top: 4px; }
</style>
</head>
<body>
  <div class="h">📊 통계</div>
  <div class="grid">
    <div class="stat"><div class="num">64</div><div class="lbl">총 리포트</div></div>
    <div class="stat"><div class="num">9.4k</div><div class="lbl">총 기사 수</div></div>
    <div class="stat"><div class="num">5.8k</div><div class="lbl">영어</div></div>
    <div class="stat"><div class="num">3.6k</div><div class="lbl">한국어</div></div>
  </div>
</body>
</html>

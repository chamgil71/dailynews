<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  body { padding: 0; gap: 0; }
  .theme { display: grid; grid-template-columns: 60px 1fr; gap: 0; align-items: center; padding: 12px 18px; border-bottom: 1px solid var(--color-border); }
  .theme:last-child { border-bottom: none; }
  .strip { display: flex; width: 56px; height: 36px; border-radius: 6px; overflow: hidden; border: 1px solid rgba(0,0,0,.08); }
  .strip span { flex: 1; }
  .name { font: 700 0.95rem var(--font-sans); color: var(--color-text); }
  .desc { font: 400 0.78rem var(--font-mono); color: var(--color-muted); margin-top: 2px; }
  .swap { font: 400 11px var(--font-mono); color: var(--color-muted); margin-left: auto; }
  .row { display: flex; align-items: center; gap: 14px; }
  .meta { display: flex; flex-direction: column; }
</style>
</head>
<body>
  <div class="theme">
    <div class="strip">
      <span style="background:#1e3a5f"></span>
      <span style="background:#2563eb"></span>
      <span style="background:#f8fafc"></span>
    </div>
    <div class="row">
      <div class="meta"><div class="name">Navy <span style="font-weight:400;color:var(--color-muted);font-size:0.75rem">— default</span></div><div class="desc">#1e3a5f · #2563eb · #f8fafc</div></div>
      <div class="swap">.theme (root)</div>
    </div>
  </div>
  <div class="theme">
    <div class="strip">
      <span style="background:#1a1a1a"></span>
      <span style="background:#b91c1c"></span>
      <span style="background:#f7f5f0"></span>
    </div>
    <div class="row">
      <div class="meta"><div class="name">Ink</div><div class="desc">#1a1a1a · #b91c1c · #f7f5f0</div></div>
      <div class="swap">.theme-ink</div>
    </div>
  </div>
  <div class="theme">
    <div class="strip">
      <span style="background:#064e3b"></span>
      <span style="background:#047857"></span>
      <span style="background:#f6faf8"></span>
    </div>
    <div class="row">
      <div class="meta"><div class="name">Forest</div><div class="desc">#064e3b · #047857 · #f6faf8</div></div>
      <div class="swap">.theme-forest</div>
    </div>
  </div>
</body>
</html>

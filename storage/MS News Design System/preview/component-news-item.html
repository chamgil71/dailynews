<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  body { padding: 18px 22px; }
  .list { border: 1px solid var(--color-border); border-radius: 8px; overflow: hidden; }
  .item { padding: 10px 16px; border-bottom: 1px solid var(--color-border); font: 400 .85rem var(--font-sans); }
  .item:last-child { border-bottom: none; }
  .item a { color: var(--color-blue); text-decoration: none; }
  .item a:hover { text-decoration: underline; }
  .cat { font: 500 .72rem var(--font-sans); color: var(--color-muted); background: var(--color-bg); padding: 1px 6px; border-radius: 4px; margin-right: 6px; }
  mark { background: #fef08a; border-radius: 2px; padding: 0 2px; }
</style>
</head>
<body>
  <div class="eyebrow">News item · category chip + link + optional search hit</div>
  <div class="list">
    <div class="item"><span class="cat">국내 IT·기술</span><a>AI가 국가 R&amp;D 예산심의 돕는다…'예산심의 특화 AI' 본격 도입</a></div>
    <div class="item"><span class="cat">AI·ML</span><a>Anthropic launches <mark>Cowork</mark>, a Claude Desktop agent that works in your files</a></div>
    <div class="item"><span class="cat">국내 경제</span><a>경제·금융·통화 수장들 "삼성전자 파업 땐 韓경제 상당한 리스크"</a></div>
  </div>
</body>
</html>

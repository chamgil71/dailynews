<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  body { padding: 20px 24px; gap: 16px; }
  .row { gap: 14px; align-items: center; flex-wrap: wrap; }
  .btn-primary { background: var(--color-blue); color: #fff; text-decoration: none; padding: 10px 24px; border-radius: 8px; font-weight: 600; font: 600 .95rem var(--font-sans); border: none; cursor: pointer; }
  .tab { padding: 5px 14px; border-radius: 20px; font: 500 .82rem var(--font-sans); border: 1px solid var(--color-border); background: var(--color-card); cursor: pointer; color: var(--color-text); transition: all .15s; }
  .tab:hover { border-color: var(--color-blue); color: var(--color-blue); }
  .tab.active { background: var(--color-blue); color: #fff; border-color: var(--color-blue); }
  .news-toggle { background: none; border: 1px solid var(--color-border); border-radius: 8px; padding: 8px 16px; font-size: .85rem; color: var(--color-muted); display: flex; justify-content: space-between; align-items: center; min-width: 280px; }
</style>
</head>
<body>
  <div class="eyebrow">Buttons & controls</div>
  <div class="row">
    <button class="btn-primary">구독 신청하기</button>
    <button class="tab active">전체</button>
    <button class="tab">🌐 영어</button>
    <button class="tab">🇰🇷 한국어</button>
  </div>
  <button class="news-toggle">🌐 영어 뉴스 94건 보기 <span>▼</span></button>
</body>
</html>

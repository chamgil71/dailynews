<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  body { padding: 20px 24px; gap: 14px; }
  .row { gap: 10px; flex-wrap: wrap; }
  .badge { padding: 3px 10px; border-radius: 20px; font: 500 .78rem var(--font-sans); }
  .badge-blue   { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
  .badge-green  { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
  .badge-orange { background: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; }
  .note { font: 400 11px var(--font-mono); color: var(--color-muted); }
</style>
</head>
<body>
  <div class="eyebrow">Meta badges · pills</div>
  <div class="row">
    <span class="badge badge-blue">📅 2026년 05월 14일</span>
    <span class="badge badge-blue">🤖 AI 자동 분석</span>
    <span class="badge badge-blue">🌐 EN + KO</span>
  </div>
  <div class="row">
    <span class="badge badge-blue">EN 94건</span>
    <span class="badge badge-green">KO 70건</span>
    <span class="badge badge-orange">AI 분석 40건</span>
  </div>
  <div class="note">border-radius 20 · 1px border · weight 500 · 0.78rem · always leading emoji or count noun</div>
</body>
</html>

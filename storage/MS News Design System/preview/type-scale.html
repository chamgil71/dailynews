<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  body { gap: 6px; padding: 22px 28px; }
  .h1 { font-size: 1.6rem; font-weight: 700; color: var(--color-navy); line-height: 1.3; }
  .h2 { font-size: 1.2rem; font-weight: 600; color: var(--color-blue); padding-bottom: 4px; border-bottom: 2px solid var(--color-border); }
  .h3 { font-size: 1rem; font-weight: 600; color: var(--color-navy); }
  .body { font-size: 1rem; line-height: 1.7; color: var(--color-text); }
  .meta-row { display: flex; gap: 18px; font-size: 11px; color: var(--color-muted); font-family: var(--font-mono); margin-top: 2px; }
</style>
</head>
<body>
  <div class="h1">📰 Daily News Brief</div>
  <div class="h2">🌐 Global News Analysis</div>
  <div class="h3">핵심 이슈 TOP 3</div>
  <div class="body">시스템 폰트 스택 · 1.7 line-height · 한국어 가독성 최우선</div>
  <div class="meta-row">
    <span>H1 / 1.6rem · 700</span>
    <span>H2 / 1.2rem · 600 · blue</span>
    <span>H3 / 1rem · 600 · navy</span>
    <span>Body / 1rem · 1.7</span>
  </div>
</body>
</html>

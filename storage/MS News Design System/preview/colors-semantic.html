<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
<style>
  .chip { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; }
  .sw { width: 90px; height: 70px; border-radius: 12px; border: 1px solid rgba(0,0,0,.06); }
  .label { font: 600 12px var(--font-sans); }
  .hex { font: 400 11px var(--font-mono); color: var(--color-muted); }
  .group { display: flex; gap: 4px; align-items: flex-end; }
  .group .sw { width: 30px; height: 70px; border-radius: 4px; }
</style>
</head>
<body>
  <div class="eyebrow">Semantic accents · used only in count badges + search</div>
  <div class="row">
    <div class="chip">
      <div class="group">
        <div class="sw" style="background:#16a34a"></div>
        <div class="sw" style="background:#bbf7d0;height:40px"></div>
        <div class="sw" style="background:#f0fdf4;height:24px;border:1px solid #bbf7d0"></div>
      </div>
      <div class="label">Green · KO</div>
      <div class="hex">#16a34a / 200 / 50</div>
    </div>
    <div class="chip">
      <div class="group">
        <div class="sw" style="background:#ea580c"></div>
        <div class="sw" style="background:#fed7aa;height:40px"></div>
        <div class="sw" style="background:#fff7ed;height:24px;border:1px solid #fed7aa"></div>
      </div>
      <div class="label">Orange · AI</div>
      <div class="hex">#ea580c / 200 / 50</div>
    </div>
    <div class="chip">
      <div class="sw" style="background:#fef08a"></div>
      <div class="label">Yellow · &lt;mark&gt;</div>
      <div class="hex">#fef08a</div>
    </div>
  </div>
</body>
</html>

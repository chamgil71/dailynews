function parseStats(md) {
  const line = md.split('\n').find(l => l.startsWith('> 📊')) || '';
  const num = (re) => { const m = line.match(re); return m ? parseInt(m[1]) : 0; };
  return {
    total:      num(/총 (\d+)건/),
    en:         num(/EN:\s*(\d+)/),
    ko:         num(/KO:\s*(\d+)/),
    sent_to_ai: num(/AI 분석:\s*(\d+)건/),
  };
}

const frame = document.getElementById('frame');
function setTheme(t) {
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b.dataset.t === t));
  frame.srcdoc = render[t]();
  localStorage.setItem('theme-preview', t);
}
document.querySelectorAll('.tab').forEach(b => b.addEventListener('click', () => setTheme(b.dataset.t)));
document.addEventListener('keydown', (e) => {
  const map = { '1':'classic', '2':'minimal', '3':'editorial', '4':'terminal' };
  if (map[e.key]) setTheme(map[e.key]);
});

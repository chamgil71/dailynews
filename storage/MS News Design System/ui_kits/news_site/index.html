<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MS News — UI Kit prototype</title>
  <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    /* Use system fonts that mirror the original publish/* CSS */

    /* ── Sticky chrome header ─────────────────────────────────────────────── */
    .ms-header {
      background: var(--color-navy);
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--header-h);
      position: sticky; top: 0; z-index: 100;
      box-shadow: var(--shadow-header);
    }
    .ms-header .logo {
      font-size: 1.15rem; font-weight: 700;
      letter-spacing: var(--tracking-tight);
    }
    .ms-header .logo span { color: var(--color-blue-light); }
    .ms-header nav a {
      color: var(--color-on-dark-muted);
      text-decoration: none;
      margin-left: 20px;
      font-size: var(--type-small);
      transition: color var(--motion-fast);
      cursor: pointer;
    }
    .ms-header nav a:hover,
    .ms-header nav a.active { color: #fff; font-weight: 600; }

    /* ── Single-column reading layout ─────────────────────────────────────── */
    .container { max-width: var(--container-max); margin: 0 auto; padding: 36px 20px 80px; }

    /* ── App layout (sidebar + main) ──────────────────────────────────────── */
    .ms-layout {
      max-width: var(--layout-max);
      margin: 0 auto;
      padding: 32px 20px 80px;
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      gap: 28px;
    }
    .ms-sidebar { position: sticky; top: 80px; align-self: start; display: flex; flex-direction: column; gap: 16px; }
    @media (max-width: 720px) {
      .ms-layout { grid-template-columns: 1fr; }
      .ms-sidebar { display: none; }
    }

    .sidebar-card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow-card-sm);
    }
    .sidebar-card h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--color-muted);
      margin: 0 0 12px;
      border: none;
      padding: 0;
      font-weight: 700;
    }
    .search-wrap { position: relative; }
    .search-wrap input {
      width: 100%;
      padding: 9px 36px 9px 12px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      font: 400 0.9rem var(--font-sans);
      outline: none;
      color: var(--color-text);
      background: var(--color-card);
      transition: border-color var(--motion-base);
    }
    .search-wrap input:focus { border-color: var(--color-blue); }
    .search-wrap .icon {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--color-muted);
      pointer-events: none;
    }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-item {
      text-align: center; padding: 10px;
      background: var(--color-bg); border-radius: var(--radius-md);
    }
    .stat-item .num { font-size: 1.4rem; font-weight: 700; color: var(--color-blue); line-height: 1; }
    .stat-item .lbl { font-size: 0.72rem; color: var(--color-muted); margin-top: 4px; }
    .date-list { list-style: none; padding: 0; margin: 0; }
    .date-list li {
      padding: 7px 0;
      border-bottom: 1px solid var(--color-border);
    }
    .date-list li:last-child { border-bottom: none; }
    .date-list a {
      color: var(--color-text);
      text-decoration: none;
      font-size: 0.88rem;
      display: flex; align-items: center; gap: 6px;
      transition: color var(--motion-fast);
      cursor: pointer;
    }
    .date-list a:hover { color: var(--color-blue); }
    .date-list a.active { color: var(--color-blue); font-weight: 600; }

    /* ── Card ─────────────────────────────────────────────────────────────── */
    .card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 32px 36px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-card);
    }
    @media (max-width: 600px) {
      .card { padding: 20px; }
      .ms-header .logo { font-size: 1rem; }
    }

    /* ── Meta badges (info) ───────────────────────────────────────────────── */
    .meta {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 24px;
    }
    .badge {
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      font: 500 var(--type-badge) var(--font-sans);
      display: inline-block;
    }
    .badge-blue   { background: var(--color-blue-50);   color: var(--color-blue);   border: 1px solid var(--color-blue-200); }
    .badge-green  { background: var(--color-green-50);  color: var(--color-green);  border: 1px solid var(--color-green-200); }
    .badge-orange { background: var(--color-orange-50); color: var(--color-orange); border: 1px solid var(--color-orange-200); }
    .badge:not([class*="badge-"]) { background: var(--color-blue-50); color: var(--color-blue); border: 1px solid var(--color-blue-200); }

    /* ── Quote ────────────────────────────────────────────────────────────── */
    .ms-quote {
      border-left: 4px solid var(--color-blue);
      padding: 8px 16px;
      background: var(--color-blue-50);
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      margin: 1em 0;
      color: var(--color-muted);
      font-size: 0.92rem;
      line-height: 1.6;
    }

    /* ── App view: controls + report header ───────────────────────────────── */
    .controls {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
    }
    .controls h2 {
      font-size: 1.1rem;
      color: var(--color-navy);
      margin: 0;
      border: none;
      padding: 0;
    }
    .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .tab {
      padding: 5px 14px;
      border-radius: var(--radius-pill);
      font: 500 0.82rem var(--font-sans);
      border: 1px solid var(--color-border);
      background: var(--color-card);
      cursor: pointer;
      transition: all var(--motion-fast);
      color: var(--color-text);
    }
    .tab:hover { border-color: var(--color-blue); color: var(--color-blue); }
    .tab.active { background: var(--color-blue); color: #fff; border-color: var(--color-blue); }

    .report-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
    }
    .report-date { font-size: 1.15rem; font-weight: 700; color: var(--color-navy); }
    .badges { display: flex; gap: 6px; flex-wrap: wrap; }

    /* ── Analysis body styles in app view ─────────────────────────────────── */
    .analysis h2 {
      font-size: 1rem;
      color: var(--color-blue);
      margin: 1.2em 0 0.4em;
      padding-bottom: 4px;
      border-bottom: 2px solid var(--color-border);
    }
    .analysis h3 { font-size: 0.95rem; color: var(--color-navy); margin: 1em 0 0.3em; }
    .analysis p  { font-size: 0.9rem; margin-bottom: 0.6em; }
    .analysis ol,
    .analysis ul { padding-left: 1.2em; font-size: 0.9rem; margin-bottom: 0.6em; }
    .analysis li { margin-bottom: 0.25em; }
    .analysis hr { border: none; border-top: 1px solid var(--color-border); margin: 1.2em 0; }
    .analysis a  { color: var(--color-blue); }
    .analysis strong { color: var(--color-navy); }

    /* ── News list ────────────────────────────────────────────────────────── */
    .news-block { margin-top: 10px; }
    .news-toggle {
      background: none;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 8px 16px;
      font: 400 0.85rem var(--font-sans);
      cursor: pointer;
      width: 100%;
      text-align: left;
      color: var(--color-muted);
      display: flex; justify-content: space-between; align-items: center;
      transition: background var(--motion-fast);
    }
    .news-toggle:hover { background: var(--color-bg); }
    .news-list {
      margin-top: 10px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .news-item {
      padding: 10px 16px;
      border-bottom: 1px solid var(--color-border);
      font-size: 0.83rem;
    }
    .news-item:last-child { border-bottom: none; }
    .news-item a { color: var(--color-blue); text-decoration: none; }
    .news-item a:hover { text-decoration: underline; }
    .news-item .cat {
      font-size: 0.72rem;
      color: var(--color-muted);
      background: var(--color-bg);
      padding: 1px 6px;
      border-radius: 4px;
      margin-right: 6px;
      display: inline-block;
    }

    /* ── Primary CTA ──────────────────────────────────────────────────────── */
    .btn-primary {
      display: inline-block;
      background: var(--color-blue);
      color: #fff;
      text-decoration: none;
      padding: 10px 24px;
      border-radius: var(--radius-md);
      font-weight: 600;
    }

    /* ── Archive list ─────────────────────────────────────────────────────── */
    .archive-list { list-style: none; padding: 0; margin: 0; }
    .archive-list li {
      border-bottom: 1px solid var(--color-border);
      padding: 14px 0;
    }
    .archive-list li:last-child { border-bottom: none; }
    .archive-list a {
      font-weight: 500;
      font-size: 1rem;
      text-decoration: none;
      color: var(--color-blue);
      cursor: pointer;
    }
    .archive-list a:hover { text-decoration: underline; }
    .archive-date { color: var(--color-muted); font-size: 0.85rem; margin-top: 2px; }

    /* ── Empty / loading ──────────────────────────────────────────────────── */
    .empty { text-align: center; padding: 48px; color: var(--color-muted); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 8px; line-height: 1; }
    .empty-msg { font-size: 0.95rem; }

    /* ── Footer ───────────────────────────────────────────────────────────── */
    .ms-footer {
      text-align: center;
      padding: 24px;
      color: var(--color-muted);
      font-size: var(--type-footer);
      border-top: 1px solid var(--color-border);
    }

    /* ── Animations ───────────────────────────────────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── Tweaks: theme swatch picker ─────────────────────────────────────── */
    .theme-swatches { display: flex; flex-direction: column; gap: 8px; }
    .theme-swatch {
      display: flex; align-items: center; gap: 12px;
      padding: 8px;
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      cursor: pointer;
      text-align: left;
      transition: border-color var(--motion-fast);
      font-family: var(--font-sans);
    }
    .theme-swatch:hover { border-color: var(--color-blue); }
    .theme-swatch.active { border-color: var(--color-blue); box-shadow: 0 0 0 2px var(--color-blue-50); }
    .theme-swatch-strip {
      display: flex;
      width: 56px; height: 32px;
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,.06);
    }
    .theme-swatch-strip span { flex: 1; display: block; }
    .theme-swatch[data-theme="navy"]   .ts-chrome { background: #1e3a5f; }
    .theme-swatch[data-theme="navy"]   .ts-accent { background: #2563eb; }
    .theme-swatch[data-theme="navy"]   .ts-bg     { background: #f8fafc; }
    .theme-swatch[data-theme="ink"]    .ts-chrome { background: #1a1a1a; }
    .theme-swatch[data-theme="ink"]    .ts-accent { background: #b91c1c; }
    .theme-swatch[data-theme="ink"]    .ts-bg     { background: #f7f5f0; }
    .theme-swatch[data-theme="forest"] .ts-chrome { background: #064e3b; }
    .theme-swatch[data-theme="forest"] .ts-accent { background: #047857; }
    .theme-swatch[data-theme="forest"] .ts-bg     { background: #f6faf8; }
    .ts-name { font-size: 0.85rem; font-weight: 600; color: var(--color-text); }
    .ts-sub  { font-size: 0.72rem; color: var(--color-muted); margin-top: 2px; }

    /* mark + h2 default inherits from colors_and_type.css */
  </style>
</head>
<body data-screen-label="01 News Site UI Kit">

</body>
</html>

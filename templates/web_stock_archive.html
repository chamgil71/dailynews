<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>주식시황 목록 — {{ site_title }}</title>
  {% if font_link %}{{ font_link | safe }}{% endif %}
  <style>
  {{ css_root | safe }}

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--color-bg);
    color: var(--color-text);
    line-height: var(--leading-base);
    -webkit-font-smoothing: antialiased;
  }
  /* ── 헤더 (공통 구조 — index.html 기준 통일) ── */
  header {
    background: var(--color-navy);
    color: #fff;
    padding: 0 20px;
    display: flex;
    align-items: center;
    height: 58px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
    gap: 0;
  }
  header .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: -.3px; margin-right: 24px; white-space: nowrap; cursor: pointer; }
  header .logo span, header .logo .accent { color: var(--color-blue-light); }
  .header-nav { display: flex; align-items: center; height: 100%; flex: 1; gap: 2px; }
  .hnav-tab {
    display: flex; align-items: center; height: 100%;
    padding: 0 14px;
    color: rgba(255,255,255,.65);
    text-decoration: none; font-size: .88rem; font-weight: 500;
    border-bottom: 3px solid transparent;
    border-top: none; border-left: none; border-right: none;
    cursor: pointer; background: none;
    transition: color .15s, border-color .15s; white-space: nowrap;
  }
  .hnav-tab:hover { color: rgba(255,255,255,.9); }
  .hnav-tab.active { color: #fff; font-weight: 600; border-bottom-color: var(--color-blue-light); }
  .tab-label { pointer-events: none; }
  .header-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .btn-icon {
    background: none; border: none; color: rgba(255,255,255,.7);
    cursor: pointer; padding: 6px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: color .15s, background .15s; text-decoration: none; font-size: 1rem;
  }
  .btn-icon:hover { color: #fff; background: rgba(255,255,255,.1); }
  .container { max-width: 860px; margin: 0 auto; padding: 36px 20px 80px; }
  .card {
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 32px 36px;
    margin-bottom: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  h1 { font-size: 1.6rem; color: var(--color-navy); margin-bottom: 6px;
       font-weight: 700; line-height: 1.3; }
  a  { color: var(--color-blue); text-underline-offset: 2px; }
  .archive-list { list-style: none; padding: 0; }
  .archive-list li { border-bottom: 1px solid var(--color-border); padding: 14px 0; }
  .archive-list li:last-child { border-bottom: none; }
  .archive-list a { font-weight: 500; font-size: 1rem; text-decoration: none; }
  .archive-list a:hover { text-decoration: underline; }
  .archive-list .date { color: var(--color-muted); font-size: .85rem; margin-top: 2px; }
  footer {
    text-align: center;
    color: var(--color-muted);
    font-size: .8rem;
    padding: 24px;
    border-top: 1px solid var(--color-border);
  }
  </style>
</head>
<body>
  <header>
    <div class="logo" onclick="location.href='../'" style="cursor:pointer;">{{ site_logo_html | safe }}</div>
    <nav id="site-nav">{{ nav | safe }}</nav>
  </header>

  <div class="container">
    <div class="card">
      <h1>📚 주식 시황 전체 목록</h1>
      <p style="color:var(--color-muted);margin:.5em 0 1.5em">총 {{ items | length }}개 리포트</p>
      <ul class="archive-list">
        {% for item in items %}
        <li>
          <a href="{{ item.date }}.html">📊 {{ item.display }} 시황</a>
          <div class="date">{{ item.date }}</div>
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>

  {% include 'footer.html' %}
  <script src="../nav.js" defer></script>
</body>
</html>

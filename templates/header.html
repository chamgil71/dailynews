<!-- templates/header.html -->
<header>
  <div class="logo" onclick="location.href='{{ nav_prefix }}index.html'" style="cursor:pointer;">AI <span>News</span> Brief</div>

  <nav class="header-nav">
    <a class="hnav-tab{% if active_tab == 'news' %} active{% endif %}" href="{{ nav_prefix }}index.html" data-section="news">📰<span class="tab-label"> 뉴스 브리핑</span><span class="tab-label-m"> 뉴스</span></a>
    <a class="hnav-tab{% if active_tab == 'ai-issue' %} active{% endif %}" href="{{ nav_prefix }}ai-issue/" data-section="ai-issue">🤖<span class="tab-label"> AI이슈</span><span class="tab-label-m"> AI</span></a>
    <a class="hnav-tab{% if active_tab == 'stock' %} active{% endif %}" href="{{ nav_prefix }}stock/" data-section="stock">📈<span class="tab-label"> 주식 시황</span><span class="tab-label-m"> 주식</span></a>
    <a class="hnav-tab{% if active_tab == 'archive' %} active{% endif %}" href="{{ nav_prefix }}archive.html" data-section="archive">📚<span class="tab-label"> 아카이브</span><span class="tab-label-m"> 보관</span></a>
  </nav>

  <div class="header-actions">
    {% if subscribe_url %}<a href="{{ subscribe_url }}" class="btn-icon" title="뉴스레터 구독">
      <svg viewBox="0 0 16 16" width="15" height="15" fill="currentColor" aria-hidden="true"><path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1H2zm13 2.383-4.758 2.855L15 11.114v-5.73zm-.034 6.878L9.271 8.82 8 9.583 6.728 8.82l-5.694 3.44A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.739zM1 11.114l4.758-2.876L1 5.383v5.73z"/></svg>
    </a>{% endif %}
    <a href="https://github.com/chamgil71/dailynews" target="_blank" class="btn-icon" title="GitHub">
      <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
    <button class="btn-icon" id="themeBtn" title="테마 설정" onclick="if(window.openThemePanel) openThemePanel();">
      <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 1.5a5.5 5.5 0 1 1 0 11 5.5 5.5 0 0 1 0-11zM8 4a4 4 0 1 0 0 8A4 4 0 0 0 8 4zm0 1.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5z"/></svg>
    </button>
  </div>
</header>

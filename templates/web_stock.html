<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="AI 자동 생성 주식 시황 브리핑">
  <title>{{ display_date }} 주식시황 — {{ site_title }}</title>
  {% if font_link %}{{ font_link | safe }}{% endif %}
  <style>
  {{ css_root | safe }}
  {{ css_common | safe }}
  /* 주식 페이지 전용 — 공통 CSS 이외에 필요한 것만 */
  </style>
</head>
<body>
  {% include 'header.html' %}

  <div class="container">
    <div class="card">
      <h1>주식 시황 브리핑</h1>
      <div class="tag-row">
        <span class="tag">{{ display_date }}</span>
        <span class="temp-indicator {{ temp_class }}">{{ temp_label }}</span>
      </div>
      {{ md_html | safe }}
    </div>
  </div>

  <footer>
    {{ footer.powered_by }} · {{ footer.update_text }}<br>
    Generated by {{ footer.generator }} ·
    <a href="https://github.com/{{ footer.repo }}" style="color:inherit">{{ footer.repo }}</a>
    · 생성: {{ now }} KST
  </footer>
  <script src="../nav.js" defer></script>
</body>
</html>

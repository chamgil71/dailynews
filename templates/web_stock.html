<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="AI 자동 생성 주식 시황 브리핑">
  <title>{{ display_date }} 주식시황 — {{ site_title }}</title>
  {% if font_link %}{{ font_link | safe }}{% endif %}
  <style>
  {{ css_root | safe }}

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--color-bg);
    color: var(--color-text);
    line-height: var(--leading-base);
    -webkit-font-smoothing: antialiased;
  }

  /* ── 헤더 (공통 구조 — index.html 기준 통일) ── */
  header {
    background: var(--color-navy);
    color: #fff;
    padding: 0 20px;
    display: flex;
    align-items: center;
    height: 58px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
    gap: 0;
  }
  header .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: -.3px; margin-right: 24px; white-space: nowrap; cursor: pointer; }
  header .logo span, header .logo .accent { color: var(--color-blue-light); }
  .header-nav { display: flex; align-items: center; height: 100%; flex: 1; gap: 2px; }
  .hnav-tab {
    display: flex; align-items: center; height: 100%;
    padding: 0 14px;
    color: rgba(255,255,255,.65);
    text-decoration: none; font-size: .88rem; font-weight: 500;
    border-bottom: 3px solid transparent;
    border-top: none; border-left: none; border-right: none;
    cursor: pointer; background: none;
    transition: color .15s, border-color .15s; white-space: nowrap;
  }
  .hnav-tab:hover { color: rgba(255,255,255,.9); }
  .hnav-tab.active { color: #fff; font-weight: 600; border-bottom-color: var(--color-blue-light); }
  .tab-label { pointer-events: none; }
  .header-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .btn-icon {
    background: none; border: none; color: rgba(255,255,255,.7);
    cursor: pointer; padding: 6px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: color .15s, background .15s; text-decoration: none; font-size: 1rem;
  }
  .btn-icon:hover { color: #fff; background: rgba(255,255,255,.1); }

  /* ── 컨테이너 ── */
  .container { max-width: 860px; margin: 0 auto; padding: 36px 20px 80px; }

  /* ── 카드 ── */
  .card {
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 32px 36px;
    margin-bottom: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }

  /* ── 타이포그래피 ── */
  h1 { font-size: 1.6rem; color: var(--color-navy); margin-bottom: 6px;
       font-weight: 700; line-height: 1.3; }
  h2 { font-size: 1.2rem; color: var(--color-blue); margin: 2em 0 .6em;
       padding-bottom: 6px; border-bottom: 2px solid var(--color-border);
       font-weight: 600; }
  h3 { font-size: 1rem; color: var(--color-navy); margin: 1.4em 0 .4em;
       font-weight: 600; }
  p  { margin-bottom: .9em; }
  a  { color: var(--color-blue); text-underline-offset: 2px; }
  ul, ol { padding-left: 1.4em; margin-bottom: .9em; }
  li { margin-bottom: .3em; }
  hr { border: none; border-top: 1px solid var(--color-border); margin: 2em 0; }
  code { background: var(--color-code-bg); padding: 2px 6px;
         border-radius: 4px; font-size: .88em; }
  blockquote {
    border-left: 4px solid var(--color-blue);
    padding: 8px 16px;
    background: var(--color-blue-50);
    border-radius: 0 8px 8px 0;
    margin: 1em 0;
    color: var(--color-muted);
  }
  table { border-collapse: collapse; width: 100%; margin: 1em 0; }
  th, td { border: 1px solid var(--color-border); padding: 8px 12px;
           text-align: left; font-size: .9rem; }
  th { background: var(--color-blue-50); color: var(--color-navy); font-weight: 600; }

  /* ── 배지 ── */
  .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .badge {
    background: var(--color-blue-50);
    color: var(--color-blue);
    border: 1px solid var(--color-blue-200);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: .78rem;
    font-weight: 500;
  }

  /* ── 주식시황 전용 ── */
  .change-pos { color: var(--color-green); font-weight: 600; }
  .change-neg { color: var(--color-orange); font-weight: 600; }
  .temp-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 16px; border-radius: 24px; font-weight: 700;
    font-size: 1rem; margin-bottom: 16px;
  }
  .temp-risk-off { background: var(--color-orange-50); color: var(--color-orange);
                   border: 1.5px solid var(--color-orange-200); }
  .temp-neutral  { background: var(--color-blue-50);   color: var(--color-blue);
                   border: 1.5px solid var(--color-blue-200); }
  .temp-risk-on  { background: var(--color-green-50);  color: var(--color-green);
                   border: 1.5px solid var(--color-green-200); }

  /* ── 푸터 ── */
  footer {
    text-align: center;
    color: var(--color-muted);
    font-size: .8rem;
    padding: 24px;
    border-top: 1px solid var(--color-border);
  }

  /* ── 반응형 ── */
  @media (max-width: 600px) {
    .card { padding: 20px; }
    header .logo { font-size: 1rem; }
  }
  </style>
</head>
<body>
  {% include 'header.html' %}

  <div class="container">
    <div class="card">
      <h1>📊 주식 시황 브리핑</h1>
      <div class="meta">
        <span class="badge">📅 {{ display_date }}</span>
        <span class="temp-badge {{ temp_class }}">{{ temp_display }}</span>
      </div>
      {{ md_html | safe }}
    </div>
  </div>

  <footer>
    {{ footer.powered_by }} · {{ footer.update_text }}<br>
    Generated by {{ footer.generator }} ·
    <a href="https://github.com/{{ footer.repo }}" style="color:inherit">{{ footer.repo }}</a>
    · 생성: {{ now }} KST
  </footer>
  <script src="../nav.js" defer></script>
</body>
</html>

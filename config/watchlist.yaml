# config/watchlist.yaml
# 섹터 종목 추가/삭제/비활성화는 이 파일만 수정하면 됩니다.
#   - enabled: false  → 섹터 전체 임시 비활성화 (루틴 수집 제외)
#   - market: KR / US → 국내/해외 구분 (리포트 섹터 분리 표에 사용 예정)
#   종목 추가 후 git commit 하면 변경 이력이 자동 추적됩니다.

# ── Notion 설정 ───────────────────────────────────────────────────────────────
notion:
  stock_db_id: "362fae739c2b80c2ba08c6f31ae8f922"   # Notion 주식시황 DB ID (최초 notion-search 로 확인 후 입력)

# ── 시장 지수 및 매크로 지표 (watchlist1.yaml 통합) ─────────────────────────
indices:
  - { ticker: "^KS11", name: "코스피" }
  - { ticker: "^KQ11", name: "코스닥", fallback_note: "수집 실패 시 N/A 처리" }

us_indices:
  - { ticker: "^GSPC", name: "S&P 500" }
  - { ticker: "^IXIC", name: "나스닥" }
  - { ticker: "^DJI", name: "다우존스" }

macro:
  - { ticker: "KRW=X", name: "원/달러 환율" }
  - { ticker: "^TNX",  name: "미 10년물 금리" }
  - { ticker: "CL=F",  name: "WTI 유가" }

# ── 섹터 종목 ─────────────────────────────────────────────────────────────────
sectors:

  # ── 반도체 ──────────────────────────────────────────────────────────────────
  - name: "반도체"
    enabled: true
    stocks:
      - { ticker: "005930.KS", name: "삼성전자",   market: "KR" }
      - { ticker: "000660.KS", name: "SK하이닉스", market: "KR" }
      - { ticker: "042700.KS", name: "한미반도체", market: "KR" }
      - { ticker: "NVDA",      name: "엔비디아",   market: "US" }
      - { ticker: "AMD",       name: "AMD",        market: "US" }
      - { ticker: "TSM",       name: "TSMC(ADR)",  market: "US" }

  # ── AI/빅테크 ────────────────────────────────────────────────────────────────
  - name: "AI/빅테크"
    enabled: true
    stocks:
      - { ticker: "MSFT",      name: "마이크로소프트", market: "US" }
      - { ticker: "GOOGL",     name: "알파벳",         market: "US" }

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="AI가 매일 자동으로 수집·분석하는 글로벌 뉴스 브리핑">
  <title>AI News Brief</title>
  <!-- DYNAMIC_THEME_FONTS -->
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3073080552425149"
       crossorigin="anonymous"></script>
  <style>
    /* ── CSS 변수 (테마 토큰) ── */
    :root {
      --blue:     #2563eb;
      --navy:     #1e3a5f;
      --bg:       #f8fafc;
      --card:     #ffffff;
      --border:   #e2e8f0;
      --text:     #1e293b;
      --muted:    #64748b;
      --green:    #16a34a;
      --orange:   #ea580c;
      --accent:   #60a5fa;
      --header-h: 58px;
      --font-family: -apple-system, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    }
    /* Minimal 테마 */
    [data-theme="minimal"] {
      --blue:#ff5a1f; --navy:#16181a; --bg:#fafaf7; --card:#fff;
      --border:#e6e2da; --text:#16181a; --muted:#8a8f95; --accent:#ff8c00;
    }
    /* Ink 테마 */
    [data-theme="ink"] {
      --blue:#b91c1c; --navy:#1a1a1a; --bg:#f7f5f0; --card:#ffffff;
      --border:#d6d3ce; --text:#1a1a1a; --muted:#57534e; --accent:#f87171;
    }
    /* Forest 테마 */
    [data-theme="forest"] {
      --blue:#047857; --navy:#064e3b; --bg:#f6faf8; --card:#ffffff;
      --border:#d1e7dc; --text:#0f2922; --muted:#4b6b5e; --accent:#6ee7b7;
    }
    /* Editorial 테마 */
    [data-theme="editorial"] {
      --blue:#8b2a1f; --navy:#2b231a; --bg:#f4ede0; --card:#ece2cf;
      --border:#2b231a; --text:#1a1612; --muted:#8a7e6f; --accent:#8b2a1f;
      font-family: 'Noto Serif KR', Georgia, serif !important;
    }
    /* Terminal 테마 */
    [data-theme="terminal"] {
      --blue:#00ff66; --navy:#0c0f12; --bg:#0c0f12; --card:#161b22;
      --border:#30363d; --text:#00ff66; --muted:#58a6ff; --accent:#00ff66;
      font-family: 'JetBrains Mono', monospace !important;
    }
    /* DYNAMIC_THEME_CSS */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-family, -apple-system, sans-serif);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 헤더 ── */
    header {
      background: var(--navy);
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--header-h);
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -.3px;
      cursor: pointer;
      margin-right: 12px;
      white-space: nowrap;
    }
    .logo .accent { color: var(--accent); }
    .logo img { height: 24px; vertical-align: middle; }

    /* 탭 네비게이션 */
    .hnav {
      display: flex;
      align-items: stretch;
      height: 100%;
      gap: 4px;
      flex: 1;
    }
    .hnav-tab {
      display: inline-flex;
      align-items: center;
      padding: 0 14px;
      color: rgba(255,255,255,.7);
      text-decoration: none;
      font-size: .88rem;
      font-weight: 500;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      transition: color .15s, border-color .15s;
    }
    .hnav-tab:hover  { color: #fff; }
    .hnav-tab.active { color: #fff; font-weight: 600; border-bottom-color: var(--accent); }
    [data-section="news"].active    { border-bottom-color: #60a5fa; }
    [data-section="ai-issue"].active{ border-bottom-color: #a78bfa; }
    [data-section="stock"].active   { border-bottom-color: #34d399; }
    [data-section="archive"].active  { border-bottom-color: #60a5fa; }
    .tab-label { pointer-events: none; }
    .tab-label-m { display: none; pointer-events: none; }
    .btn-subscribe {
      display: inline-flex; align-items: center;
      padding: 4px 14px; border-radius: 6px;
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
      color: #fff; font-size: .8rem; font-weight: 500;
      text-decoration: none; white-space: nowrap;
      transition: background .15s;
    }
    .btn-subscribe:hover { background: rgba(255,255,255,.25); }
    .btn-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,.45);
      color: rgba(255,255,255,.85);
      text-decoration: none; flex-shrink: 0;
      transition: background .15s, border-color .15s;
    }
    .btn-icon:hover { background: rgba(255,255,255,.15); border-color: #fff; color: #fff; }
    @media (max-width: 600px) {
      header { padding: 0 12px; }
      .logo { font-size: .95rem; margin-right: 6px; }
      .tab-label { display: none; }
      .tab-label-m { display: inline; }
      .hnav-tab { padding: 0 8px; font-size: .8rem; }
    }

    /* ── 사이드바 (목록) ── */
    .sidebar {
      position: sticky;
      top: calc(var(--header-h) + 16px);
      align-self: start;
      max-height: calc(100vh - var(--header-h) - 32px);
      overflow-y: auto;
      overscroll-behavior: contain;
    }
    /* ── 레이아웃 ── */
    .page-wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 20px 80px;
    }
    .grid-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 32px;
    }
    @media (max-width: 900px) {
      .grid-layout { grid-template-columns: 1fr; }
      .sidebar { position: static; max-height: none; }
    }
    /* ── 공통 카드 ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .card-sm {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: box-shadow .15s, transform .1s;
    }
    .card-sm:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); transform: translateY(-1px); }
    .card-sm.selected { border-color: var(--blue); box-shadow: 0 0 0 2px var(--blue); }
    /* ── 뉴스 목록 카드 ── */
    .news-date {
      font-size: .75rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: .04em;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .news-headline {
      font-size: .95rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }
    .news-stats {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: .72rem;
      font-weight: 600;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    /* ── 뷰어 ── */
    .viewer {
      min-height: 400px;
    }
    .viewer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .viewer-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.3;
    }
    .viewer-meta {
      font-size: .85rem;
      color: var(--muted);
      margin-top: 4px;
    }
    /* ── 검색 ── */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      margin-bottom: 14px;
    }
    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: .9rem;
      color: var(--text);
    }
    .search-bar input::placeholder { color: var(--muted); }
    /* ── 섹션 탭 패널 ── */
    .section-panel { display: none; }
    .section-panel.active { display: block; }
    /* ── 콘텐츠 prose ── */
    .prose { font-size: .95rem; line-height: 1.75; }
    .prose h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 12px; color: var(--navy); }
    .prose h2 {
      font-size: 1.15rem; font-weight: 700; margin: 28px 0 10px;
      color: var(--navy); border-bottom: 2px solid var(--border); padding-bottom: 6px;
    }
    .prose h3 { font-size: 1rem; font-weight: 700; margin: 20px 0 6px; }
    .prose p { margin: 0 0 12px; }
    .prose a { color: var(--blue); text-decoration: none; }
    .prose a:hover { text-decoration: underline; }
    .prose ul, .prose ol { padding-left: 1.4em; margin: 0 0 12px; }
    .prose li { margin-bottom: 4px; }
    .prose strong { font-weight: 700; }
    .prose table {
      width: 100%; border-collapse: collapse; margin: 16px 0;
      font-size: .875rem;
    }
    .prose th {
      background: var(--navy); color: #fff; padding: 8px 12px;
      text-align: left; font-weight: 600;
    }
    .prose td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .prose tr:nth-child(even) td { background: var(--bg); }
    .prose blockquote {
      border-left: 4px solid var(--blue); padding: 8px 16px; margin: 12px 0;
      background: rgba(37,99,235,.04); color: var(--muted); font-style: italic;
    }
    .prose code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: .85em; }
    .prose hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    /* ── 통계 ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-box {
      text-align: center;
      padding: 16px 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .stat-num {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--navy);
    }
    .stat-label {
      font-size: .72rem;
      color: var(--muted);
      margin-top: 2px;
    }
    /* ── 차트 바 ── */
    .bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: .82rem;
    }
    .bar-label { width: 80px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-bg {
      flex: 1;
      background: var(--border);
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 4px;
      transition: width .4s ease;
    }
    .bar-count { width: 28px; text-align: right; color: var(--muted); }
    /* ── 로딩 / 빈 상태 ── */
    .loading-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      color: var(--muted);
      font-size: .95rem;
    }
    /* ── AI이슈 슬라이더 ── */
    .ai-slider { position: relative; overflow: hidden; border-radius: 12px; border: 1px solid var(--border); background: var(--card); margin-bottom: 20px; }
    .ai-slides { display: flex; transition: transform .4s ease; }
    .ai-slide { min-width: 100%; padding: 24px 28px; }
    .ai-slide .rank { font-size: .72rem; font-weight: 700; color: var(--blue); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
    .ai-slide .title { font-size: 1.05rem; font-weight: 700; color: var(--navy); line-height: 1.4; margin-bottom: 8px; }
    .ai-slide .summary { font-size: .88rem; color: var(--muted); line-height: 1.6; }
    .ai-slide .src-link { margin-top: 10px; font-size: .78rem; }
    .ai-slide .src-link a { color: var(--blue); text-decoration: none; }
    .ai-slide .src-link a:hover { text-decoration: underline; }
    .ai-dots { display: flex; justify-content: center; gap: 6px; padding: 10px 0; }
    .ai-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); cursor: pointer; transition: background .2s; }
    .ai-dot.on { background: var(--blue); }
    .ai-nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,.8); border: 1px solid var(--border); border-radius: 50%; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; z-index: 5; }
    .ai-nav-btn.prev { left: 8px; }
    .ai-nav-btn.next { right: 8px; }
    /* ── 테마 피커 ── */
    .theme-picker {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .theme-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card);
      cursor: pointer;
      font-size: .8rem;
      font-weight: 500;
      color: var(--text);
      transition: border-color .15s, box-shadow .15s;
    }
    .theme-btn:hover { border-color: var(--blue); }
    .theme-btn.active { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(37,99,235,.15); }
    .theme-swatch {
      display: flex;
      gap: 3px;
    }
    .theme-swatch span {
      width: 10px; height: 10px; border-radius: 50%;
    }
    /* ── 검색 결과 ── */
    .search-result-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item .sr-date {
      font-size: .72rem; color: var(--muted); margin-bottom: 2px;
    }
    .search-result-item .sr-title {
      font-size: .9rem; font-weight: 600; color: var(--text);
    }
    .search-result-item .sr-title a {
      color: inherit; text-decoration: none;
    }
    .search-result-item .sr-title a:hover { color: var(--blue); }
    .search-result-item .sr-label {
      display: inline-block; font-size: .68rem;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 3px; padding: 1px 5px;
      margin-left: 4px; color: var(--muted);
    }
    mark { background: #fef08a; border-radius: 2px; }
    /* ── 필터 체크박스 섹션 ── */
    .search-filters {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 4px;
      font-size: .78rem;
      color: var(--muted);
    }
    .search-filters label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: .78rem;
      padding: 32px 20px;
      border-top: 1px solid var(--border);
      margin-top: 48px;
    }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <!-- NAV_INJECT -->

  <div class="page-wrap">
    <!-- ── 뉴스 패널 ── -->
    <div id="panel-news" class="section-panel active">
      <div class="grid-layout">
        <!-- 사이드바 -->
        <aside class="sidebar" id="news-sidebar">
          <div class="search-bar">
            <span style="color:var(--muted)">🔍</span>
            <input id="news-search" type="text" placeholder="기사 검색…" autocomplete="off">
          </div>
          <div class="search-filters">
            <label><input type="checkbox" id="sf-news" checked style="accent-color:#1d4ed8"> 뉴스</label>
            <label><input type="checkbox" id="sf-ai"   checked style="accent-color:#6d28d9"> AI이슈</label>
            <label><input type="checkbox" id="sf-stock" checked style="accent-color:#15803d"> 주식</label>
          </div>
          <!-- 검색 결과 표시 영역 -->
          <div id="search-results-area" style="display:none;margin-top:12px"></div>
          <!-- 날짜별 리포트 목록 -->
          <div id="news-list" style="margin-top:12px"></div>
        </aside>
        <!-- 뷰어 -->
        <main class="viewer" id="news-viewer">
          <div class="loading-msg">📰 리포트를 불러오는 중…</div>
        </main>
      </div>
    </div>

    <!-- ── AI이슈 패널 ── -->
    <div id="panel-ai-issue" class="section-panel">
      <div class="grid-layout">
        <aside class="sidebar" id="ai-sidebar">
          <div style="font-size:.78rem;color:var(--muted);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px">AI 이슈 목록</div>
          <div id="ai-list"></div>
        </aside>
        <main class="viewer" id="ai-viewer">
          <div class="loading-msg">🤖 AI 이슈 데이터를 불러오는 중…</div>
        </main>
      </div>
    </div>

    <!-- ── 주식 패널 ── -->
    <div id="panel-stock" class="section-panel">
      <div class="grid-layout">
        <aside class="sidebar" id="stock-sidebar">
          <div style="font-size:.78rem;color:var(--muted);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px">주식 시황 목록</div>
          <div id="stock-list"></div>
        </aside>
        <main class="viewer" id="stock-viewer">
          <div class="loading-msg">📈 주식 데이터를 불러오는 중…</div>
        </main>
      </div>
    </div>

    <!-- ── 아카이브 패널 ── -->
    <div id="panel-archive" class="section-panel">
      <div class="loading-msg">📚 아카이브로 이동 중…</div>
    </div>

    <!-- ── 테마 패널 ── -->
    <div id="panel-theme" class="section-panel">
      <div class="card" style="max-width:600px;margin:0 auto">
        <h2 style="font-size:1.2rem;font-weight:700;margin-bottom:16px">🎨 테마 선택</h2>
        <div class="theme-picker" id="theme-picker"></div>
      </div>
    </div>
  </div>

  <footer>
    <p>FOOTER_PLACEHOLDER</p>
    <p style="margin-top:4px">Powered by Gemini AI &amp; RSS · <a href="SUBSCRIBE_URL_PLACEHOLDER">뉴스레터 구독</a></p>
  </footer>

  <script>
  // ── 설정 ──────────────────────────────────────────────────────────────────
  const SITE_URL        = 'SITE_URL_PLACEHOLDER';
  const REPORTS_DATA    = 'reports-data.json';
  const AI_ISSUE_DATA   = 'ai-issue/data.json';
  const STOCK_DATA      = 'stock/stock-data.json';
  const SEARCH_INDEX    = 'search-index.json';

  // ── 테마 ──────────────────────────────────────────────────────────────────
  const THEMES = THEMES_PLACEHOLDER;
  let currentTheme = localStorage.getItem('theme') || THEMES[0]?.name || 'default';
  function applyTheme(name) {
    document.body.setAttribute('data-theme', name);
    currentTheme = name;
    localStorage.setItem('theme', name);
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === name));
  }

  // ── 유틸 ──────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fetchJson(url) {
    return fetch(url + '?v=' + Date.now()).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });
  }

  // ── 탭 전환 ──────────────────────────────────────────────────────────────
  const NAV_SECTIONS = ['news','ai-issue','stock','archive'];
  let activeSection = 'news';
  function activateSection(name) {
    if (name === 'archive') {
      window.location.href = 'archive.html';
      return;
    }
    document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
    const panel = document.getElementById('panel-' + name);
    if (panel) panel.classList.add('active');
    document.querySelectorAll('.hnav-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.section === name);
    });
    activeSection = name;
    history.replaceState(null, '', '#' + name);
    if (name === 'news')     initNews();
    if (name === 'ai-issue') initAiIssue();
    if (name === 'stock')    initStock();
  }

  // ── 뉴스 섹션 ────────────────────────────────────────────────────────────
  let newsLoaded = false, newsData = null, newsSearchIdx = null;
  function initNews() {
    if (newsLoaded) return;
    newsLoaded = true;
    fetchJson(REPORTS_DATA).then(data => {
      newsData = data;
      renderNewsList(data.reports || []);
      if (data.reports && data.reports.length > 0) loadNewsReport(data.reports[0]);
    }).catch(e => {
      document.getElementById('news-viewer').innerHTML = '<div class="loading-msg">⚠️ 데이터 로드 실패: ' + e.message + '</div>';
    });
  }
  function renderNewsList(reports) {
    const list = document.getElementById('news-list');
    list.innerHTML = reports.map((r, i) => `
      <div class="card-sm ${i===0?'selected':''}" data-date="${esc(r.date)}" onclick="loadNewsReport(${JSON.stringify(r).replace(/"/g,'&quot;')},this)">
        <div class="news-date">${esc(r.date)}</div>
        <div class="news-headline">${esc(r.title || r.date + ' 브리핑')}</div>
        <div class="news-stats">
          <span class="badge">📰 ${r.total||0}건</span>
          <span class="badge">🇺🇸 ${r.en||0}</span>
          <span class="badge">🇰🇷 ${r.ko||0}</span>
        </div>
      </div>`).join('');
  }
  function loadNewsReport(report, el) {
    if (el) { document.querySelectorAll('#news-list .card-sm').forEach(c=>c.classList.remove('selected')); el.classList.add('selected'); }
    const viewer = document.getElementById('news-viewer');
    viewer.innerHTML = '<div class="loading-msg">로딩 중…</div>';
    fetch('news/' + report.date + '.html?v=' + Date.now())
      .then(r => r.text())
      .then(html => {
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const body = doc.querySelector('.report-body, main, article, body');
        viewer.innerHTML = body ? body.innerHTML : html;
      })
      .catch(() => {
        viewer.innerHTML = `<div class="card"><div class="viewer-header"><div><div class="viewer-title">${esc(report.date)} 브리핑</div></div><a href="news/${esc(report.date)}.html" target="_blank" class="btn-subscribe" style="color:#fff">전체 보기 ↗</a></div><p style="color:var(--muted)">이 날짜의 리포트 파일을 인라인으로 불러올 수 없습니다.</p></div>`;
      });
  }

  // ── AI이슈 섹션 ──────────────────────────────────────────────────────────
  let aiLoaded = false, aiData = null;
  function initAiIssue() {
    if (aiLoaded) return;
    aiLoaded = true;
    fetchJson(AI_ISSUE_DATA).then(data => {
      aiData = data;
      renderAiList(data.issues || []);
      if (data.issues && data.issues.length > 0) loadAiReport(data.issues[0]);
    }).catch(e => {
      document.getElementById('ai-viewer').innerHTML = '<div class="loading-msg">⚠️ AI이슈 데이터 없음: ' + e.message + '</div>';
    });
  }
  function renderAiList(issues) {
    const list = document.getElementById('ai-list');
    list.innerHTML = issues.map((r, i) => `
      <div class="card-sm ${i===0?'selected':''}" onclick="loadAiReport(${JSON.stringify(r).replace(/"/g,'&quot;')},this)">
        <div class="news-date">${esc(r.date)}</div>
        <div class="news-headline">${esc(r.period || 'AI 이슈 브리핑')}</div>
        ${r.top3 && r.top3.length ? '<div style="font-size:.78rem;color:var(--muted);margin-top:6px;line-height:1.5">' + r.top3.slice(0,2).map(t=>'• '+esc(t)).join('<br>') + '</div>' : ''}
      </div>`).join('');
  }
  function loadAiReport(issue, el) {
    if (el) { document.querySelectorAll('#ai-list .card-sm').forEach(c=>c.classList.remove('selected')); el.classList.add('selected'); }
    const viewer = document.getElementById('ai-viewer');
    viewer.innerHTML = '<div class="loading-msg">로딩 중…</div>';
    fetch('ai-issue/' + issue.date + '.html?v=' + Date.now())
      .then(r => r.text())
      .then(html => {
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const body = doc.querySelector('.wrap, main, article, body');
        viewer.innerHTML = body ? body.innerHTML : html;
        // TOP10 슬라이더 주입
        _injectAiSlider(issue, viewer);
      })
      .catch(() => {
        viewer.innerHTML = `<div class="card"><div class="viewer-header"><div><div class="viewer-title">${esc(issue.date)} AI 이슈</div></div><a href="ai-issue/${esc(issue.date)}.html" target="_blank" class="btn-subscribe" style="color:#fff">전체 보기 ↗</a></div><p style="color:var(--muted)">리포트 파일을 인라인으로 불러올 수 없습니다.</p></div>`;
      });
  }
  function _injectAiSlider(issue, viewer) {
    const top3 = (issue.top3 || []).slice(0, 5);
    if (!top3.length) return;
    const slides = top3.map((t, i) => `
      <div class="ai-slide">
        <div class="rank">TOP ${i+1}</div>
        <div class="title">${esc(t)}</div>
      </div>`).join('');
    const dots = top3.map((_, i) => `<div class="ai-dot${i===0?' on':''}" onclick="aiGoTo(${i})"></div>`).join('');
    const sliderHtml = `
      <div class="ai-slider" id="ai-slider-widget">
        <button class="ai-nav-btn prev" onclick="aiPrev()">‹</button>
        <div class="ai-slides" id="ai-slides">${slides}</div>
        <button class="ai-nav-btn next" onclick="aiNext()">›</button>
        <div class="ai-dots">${dots}</div>
      </div>`;
    viewer.insertAdjacentHTML('afterbegin', sliderHtml);
    window._aiIdx = 0;
  }
  window.aiGoTo = function(i) {
    const slides = document.getElementById('ai-slides');
    if (!slides) return;
    const count = slides.children.length;
    window._aiIdx = (i + count) % count;
    slides.style.transform = `translateX(-${window._aiIdx * 100}%)`;
    document.querySelectorAll('.ai-dot').forEach((d, j) => d.classList.toggle('on', j === window._aiIdx));
  };
  window.aiPrev = function() { aiGoTo((window._aiIdx||0) - 1); };
  window.aiNext = function() { aiGoTo((window._aiIdx||0) + 1); };

  // ── 주식 섹션 ────────────────────────────────────────────────────────────
  let stockLoaded = false, stockData = null;
  function initStock() {
    if (stockLoaded) return;
    stockLoaded = true;
    fetchJson(STOCK_DATA).then(data => {
      stockData = data;
      renderStockList(data.reports || []);
      if (data.reports && data.reports.length > 0) loadStockReport(data.reports[0]);
    }).catch(e => {
      document.getElementById('stock-viewer').innerHTML = '<div class="loading-msg">⚠️ 주식 데이터 없음: ' + e.message + '</div>';
    });
  }
  function renderStockList(reports) {
    const list = document.getElementById('stock-list');
    list.innerHTML = reports.map((r, i) => `
      <div class="card-sm ${i===0?'selected':''}" onclick="loadStockReport(${JSON.stringify(r).replace(/"/g,'&quot;')},this)">
        <div class="news-date">${esc(r.date)}</div>
        <div class="news-headline">📊 ${esc(r.date)} 시황</div>
      </div>`).join('');
  }
  function loadStockReport(report, el) {
    if (el) { document.querySelectorAll('#stock-list .card-sm').forEach(c=>c.classList.remove('selected')); el.classList.add('selected'); }
    const viewer = document.getElementById('stock-viewer');
    viewer.innerHTML = '<div class="loading-msg">로딩 중…</div>';
    fetch('stock/' + report.date + '.html?v=' + Date.now())
      .then(r => r.text())
      .then(html => {
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const body = doc.querySelector('.container, main, article, body');
        viewer.innerHTML = body ? body.innerHTML : html;
      })
      .catch(() => {
        viewer.innerHTML = `<div class="card"><div class="viewer-header"><div><div class="viewer-title">${esc(report.date)} 주식 시황</div></div><a href="stock/${esc(report.date)}.html" target="_blank" class="btn-subscribe" style="color:#fff">전체 보기 ↗</a></div><p style="color:var(--muted)">리포트 파일을 불러올 수 없습니다.</p></div>`;
      });
  }

  // ── 통합 검색 ────────────────────────────────────────────────────────────
  let searchIndex = null, searchLoading = false;
  function loadSearchIndex(cb) {
    if (searchIndex) { cb(searchIndex); return; }
    if (searchLoading) { setTimeout(() => loadSearchIndex(cb), 100); return; }
    searchLoading = true;
    fetchJson(SEARCH_INDEX)
      .then(d => { searchIndex = d; searchLoading = false; cb(d); })
      .catch(() => { searchLoading = false; searchIndex = []; cb([]); });
  }
  let searchTimer;
  function onSearchInput() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(runSearch, 280);
  }
  function runSearch() {
    const q = document.getElementById('news-search').value.trim();
    const resultsArea = document.getElementById('search-results-area');
    const newsList = document.getElementById('news-list');
    const useNews  = document.getElementById('sf-news').checked;
    const useAi    = document.getElementById('sf-ai').checked;
    const useStock = document.getElementById('sf-stock').checked;
    if (q.length < 2) {
      resultsArea.style.display = 'none';
      resultsArea.innerHTML = '';
      newsList.style.display = '';
      return;
    }
    const ql = q.toLowerCase();
    loadSearchIndex(index => {
      const hits = [];
      index.forEach(report => {
        const t = report.type || 'news';
        if (t === 'news'     && !useNews)  return;
        if (t === 'ai-issue' && !useAi)    return;
        if (t === 'stock'    && !useStock) return;
        (report.articles || []).forEach(art => {
          if (art.title.toLowerCase().includes(ql)) {
            hits.push({ type: t, date: report.date, display: report.display,
                        report_url: report.report_url, art });
          }
        });
      });
      newsList.style.display = 'none';
      resultsArea.style.display = '';
      if (!hits.length) {
        resultsArea.innerHTML = '<p style="color:var(--muted);font-size:.85rem;padding:8px 0">검색 결과 없음</p>';
        return;
      }
      const typeLabel = { news: '뉴스', 'ai-issue': 'AI', stock: '주식' };
      const typeColor = { news: '#1d4ed8', 'ai-issue': '#6d28d9', stock: '#15803d' };
      const typeBg    = { news: '#dbeafe', 'ai-issue': '#ede9fe', stock: '#dcfce7' };
      const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\\]\\]/g, '\\$&') + ')', 'gi');
      let html = `<div style="font-size:.72rem;color:var(--muted);margin-bottom:8px;font-family:monospace">${hits.length}건 검색됨 (최대 50건)</div>`;
      hits.slice(0, 50).forEach(h => {
        const badge = `<span style="display:inline-block;font-size:.65rem;font-weight:600;padding:1px 5px;border-radius:3px;background:${typeBg[h.type]};color:${typeColor[h.type]};margin-right:4px;vertical-align:middle">${typeLabel[h.type]}</span>`;
        const dateHtml = `<span style="font-size:.72rem;color:var(--muted);margin-right:4px">${h.date}</span>`;
        const hiTitle = h.art.title.replace(re, '<mark>$1</mark>');
        const titleHtml = h.art.link
          ? `<a href="${h.art.link}" target="_blank" rel="noopener">${hiTitle}</a>`
          : `<a href="${h.report_url}" target="_blank">${hiTitle}</a>`;
        const label = h.art.label ? `<span class="sr-label">${esc(h.art.label)}</span>` : '';
        html += `<div class="search-result-item"><div class="sr-date">${badge}${dateHtml}</div><div class="sr-title">${titleHtml}${label}</div></div>`;
      });
      resultsArea.innerHTML = html;
    });
  }

  // ── 테마 피커 ────────────────────────────────────────────────────────────
  function renderThemePicker() {
    const container = document.getElementById('theme-picker');
    if (!container) return;
    container.innerHTML = THEMES.map(t => `
      <button class="theme-btn ${currentTheme===t.name?'active':''}" data-theme="${t.name}" onclick="applyTheme('${t.name}')">
        <span class="theme-swatch">${(t.swatch_colors||[]).map(c=>`<span style="background:${c}"></span>`).join('')}</span>
        ${esc(t.label||t.name)}
      </button>`).join('');
  }

  // ── 초기화 ───────────────────────────────────────────────────────────────
  (function init() {
    applyTheme(currentTheme);
    renderThemePicker();
    // 탭 클릭 이벤트
    document.querySelectorAll('.hnav-tab').forEach(tab => {
      tab.addEventListener('click', e => {
        e.preventDefault();
        const s = tab.dataset.section;
        if (s) activateSection(s);
      });
    });
    // URL 해시로 초기 탭 결정
    const hash = (location.hash || '#news').replace('#','');
    const initSection = NAV_SECTIONS.includes(hash) ? hash : 'news';
    if (initSection !== 'archive') activateSection(initSection);
    else activateSection('news');
    // 검색 이벤트
    const si = document.getElementById('news-search');
    if (si) si.addEventListener('input', onSearchInput);
    ['sf-news','sf-ai','sf-stock'].forEach(id => {
      const cb = document.getElementById(id);
      if (cb) cb.addEventListener('change', runSearch);
    });
  })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — AI News Brief</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f8f9fa; color: #333; }
    .wrap { text-align: center; padding: 40px 20px; }
    h1 { font-size: 5rem; margin: 0; color: #aaa; }
    p { font-size: 1.1rem; color: #666; margin: 16px 0 32px; }
    a { display: inline-block; padding: 12px 28px; background: #2563eb; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; }
    a:hover { background: #1d4ed8; }
  </style>
  <script>
    // GitHub Pages와 Vercel 모두에서 홈 경로를 올바르게 계산
    function goHome() {
      const path = location.pathname;
      // /dailynews/ 로 시작하면 GitHub Pages
      const base = path.startsWith('/dailynews') ? '/dailynews/' : '/';
      location.href = base;
    }
  </script>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <p>페이지를 찾을 수 없습니다.</p>
    <a href="javascript:void(0)" onclick="goHome()">🏠 홈으로 돌아가기</a>
  </div>
</body>
</html>

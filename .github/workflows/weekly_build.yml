name: Weekly Stock Build

# ── 트리거 ──────────────────────────────────────────────────────────────────
# 주 경로: 토요일 주간 루틴이 weekly_*.md 를 push 하면 자동 실행
# 수동: workflow_dispatch 로 언제든지 실행 가능
#
# 배포 흐름:
#   토요일 루틴(수집+분석+MD저장+push) → 이 워크플로우(빌드+Pages 배포)
#                                       → stock_send.yml(익일 일요일 08:00 KST 이메일·텔레그램)

on:
  push:
    branches:
      - main
    paths:
      - 'reports/stock/weekly_*.md'   # 주간 루틴이 weekly MD push 시 자동 실행
  workflow_dispatch:

# Pages 배포 동시 경합 방지 (stock_build.yml 과 같은 그룹)
concurrency:
  group: pages-deploy
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  weekly_build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      # ── 티커 이력 업데이트 ─────────────────────────────────────────────────
      - name: 티커 이력 업데이트
        run: python scripts/update_history.py
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}

      # ── HTML 빌드 (일일 + 주간 통합) ──────────────────────────────────────
      - name: 주식 시황 HTML 빌드
        run: python scripts/build_stock_site.py
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}

      # ── 뉴스 사이트도 함께 빌드 (통합 배포) ───────────────────────────────
      - name: 뉴스 사이트 HTML 빌드
        run: python scripts/build_site.py --from $(date +'%Y-%m-%d')
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}

      # ── 커밋 + 푸시 ────────────────────────────────────────────────────────
      - name: 리포트 + 사이트 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "actions@github.com"
          git add reports/stock/ reports/history/
          git add -f publish/stock/20??-??-??.html 2>/dev/null || true
          git add -f publish/stock/20??-??-??.json 2>/dev/null || true
          git add publish/stock/data.json
          git add publish/stock/index.html
          git add publish/stock/archive.html
          git add publish/app.html publish/index.html publish/archive.html 2>/dev/null || true
          git add publish/reports.json publish/reports-data.json 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "📅 Weekly stock build $(date +'%Y-%m-%d')"
          git pull --rebase --autostash -X theirs origin main
          git push

      # ── GitHub Pages 배포 ──────────────────────────────────────────────────
      - name: GitHub Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/

      - name: GitHub Pages 배포
        id: deploy
        uses: actions/deploy-pages@v4

      # ── 파이프라인 모니터링 알림 ────────────────────────────────────────────
      - name: 파이프라인 결과 알림
        if: always()
        run: |
          TODAY=$(TZ=Asia/Seoul date +'%Y-%m-%d')
          STATUS="${{ job.status }}"
          [ "$STATUS" = "success" ] && STATUS_ARG="success" || STATUS_ARG="failure"
          python scripts/notify_pipeline.py \
            --type stock \
            --status $STATUS_ARG \
            --date $TODAY
        env:
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_MONITOR: ${{ secrets.TELEGRAM_CHAT_ID_MONITOR }}
        continue-on-error: true

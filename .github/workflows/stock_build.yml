name: Stock Briefing Build

# ── 트리거 ──────────────────────────────────────────────────────────────────
# 주 경로: Claude Code 루틴이 stock MD 파일을 push 하면 자동 실행
# 백업 경로: 매주 월~금 KST 23:40 (UTC 14:40) 스케줄 — 루틴 미실행 시에만 가동
# 수동: workflow_dispatch 로 언제든지 실행 가능

on:
  push:
    paths:
      - 'reports/stock/**.md'   # Claude 루틴이 MD 파일 push 시 자동 실행
  schedule:
    - cron: '40 14 * * 1-5'    # UTC 14:40 = KST 23:40 (월~금, 루틴 실패 시 백업)
  workflow_dispatch:
    inputs:
      mode:
        description: 'build_only (HTML만) | full (수집+분석+빌드)'
        required: false
        default: 'build_only'

# Pages 배포 동시 경합 방지
concurrency:
  group: pages-deploy
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  stock_build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # push 트리거 시 최신 커밋 포함

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      # ── 오늘 리포트 존재 여부 확인 (백업 경로 조건 분기용) ───────────────────
      - name: 오늘 리포트 존재 여부 확인
        id: check_md
        run: |
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          if [ -f "reports/stock/stock_${TODAY}.md" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "오늘 MD 파일 존재 — 백업 경로 건너뜀"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "오늘 MD 파일 없음 — 백업 경로 실행"
          fi

      # ── 백업 자동화 경로 (스케줄 or full 모드, 오늘 MD 없을 때만) ──────────
      - name: 주식 데이터 수집 및 리포트 생성 (백업 경로)
        if: |
          steps.check_md.outputs.exists == 'false' && (
            github.event_name == 'schedule' ||
            (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'full'))
        run: python scripts/stock_main.py
        env:
          LLM_PROVIDER:         ${{ secrets.LLM_PROVIDER }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          NAVER_CLIENT_ID:      ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:  ${{ secrets.NAVER_CLIENT_SECRET }}
          SITE_BASE_URL:        ${{ secrets.SITE_BASE_URL }}

      # ── 티커 이력 업데이트 (모든 경로 공통) ──────────────────────────────────
      - name: 티커 이력 업데이트
        run: python scripts/update_history.py
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}

      # ── HTML 빌드 (모든 경로 공통) ─────────────────────────────────────────
      - name: 주식 시황 HTML 빌드
        run: python scripts/build_stock_site.py
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}

      # ── 뉴스 사이트도 함께 빌드 (통합 배포) ───────────────────────────────
      # 평소: 오늘 날짜 뉴스만 빌드 (빠름)
      # 테마/디자인 변경 시: 아래 --from 줄을 주석, --all 줄을 해제
      - name: 뉴스 사이트 HTML 빌드
        run: python scripts/build_site.py --from $(date +'%Y-%m-%d')
        # run: python scripts/build_site.py --all
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}

      # ── 이메일 발송 (HTML 빌드 완료 후) ────────────────────────────────────
      # push 경로: 루틴이 MD를 push했을 때
      # 백업 경로: 오늘 MD가 없어서 stock_main.py가 새로 생성했을 때
      - name: 이메일 발송
        if: |
          github.event_name == 'push' ||
          (steps.check_md.outputs.exists == 'false' && (
            github.event_name == 'schedule' ||
            (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'full')))
        run: python scripts/send_stock_email.py
        env:
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAILS:    ${{ secrets.RECIPIENT_EMAILS }}
          SITE_BASE_URL:       ${{ secrets.SITE_BASE_URL }}

      # ── 커밋 + 푸시 ────────────────────────────────────────────────────────
      - name: 리포트 + 사이트 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "actions@github.com"
          git add reports/stock/ reports/history/
          # 날짜별 stock HTML (gitignore 대상이므로 -f 강제 추가)
          # 평소: 오늘 것만 추가 (빠름) — 아래 두 줄 중 한 줄만 활성화
          git add -f publish/stock/$(TZ=Asia/Seoul date +'%Y-%m-%d').html 2>/dev/null || true
          # git add -f publish/stock/20??-??-??.html 2>/dev/null || true  # 전체 재빌드 시 사용
          # Vercel 필수 정적 파일
          git add -f publish/stock/index.html publish/stock/archive.html \
                     publish/stock/stock-data.json 2>/dev/null || true
          git add -f publish/app.html publish/index.html publish/archive.html \
                     publish/reports.json publish/reports-data.json 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "📊 Stock build $(date +'%Y-%m-%d')"
          git push

      # ── GitHub Pages 배포 ──────────────────────────────────────────────────
      - name: GitHub Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/

      - name: GitHub Pages 배포
        id: deploy
        uses: actions/deploy-pages@v4

      # ── Vercel 강제 프로덕션 배포 (Vercel Git Integration + Output Directory: publish 로 대체)
      # - name: Vercel 프로덕션 강제 배포
      #   run: npx vercel --token=${{ secrets.VERCEL_TOKEN }} --prod --yes
      #   env:
      #     VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      #     VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

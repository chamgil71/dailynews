name: Stock Briefing Build

# ── 트리거 ──────────────────────────────────────────────────────────────────
# 주 경로: Claude Code 루틴이 stock MD 파일을 push 하면 자동 실행
# 백업 경로: 매주 월~금 KST 16:45 (UTC 07:45) 스케줄 — yfinance 자동화
# 수동: workflow_dispatch 로 언제든지 실행 가능

on:
  push:
    paths:
      - 'reports/stock/**.md'   # Claude 루틴이 MD 파일 push 시 자동 실행
  schedule:
    - cron: '45 07 * * 1-5'    # UTC 07:45 = KST 16:45 (월~금, 백업 자동화)
  workflow_dispatch:
    inputs:
      mode:
        description: 'build_only (HTML만) | full (수집+분석+빌드)'
        required: false
        default: 'build_only'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  stock_build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # push 트리거 시 최신 커밋 포함

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      # ── 백업 자동화 경로 (스케줄 or full 모드) ─────────────────────────────
      - name: 주식 데이터 수집 및 리포트 생성 (백업 경로)
        if: |
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'full')
        run: python scripts/stock_main.py
        env:
          LLM_PROVIDER:         ${{ secrets.LLM_PROVIDER }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          GMAIL_USER:           ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAILS:     ${{ secrets.RECIPIENT_EMAILS }}
          SITE_BASE_URL:        ${{ secrets.SITE_BASE_URL }}
          NAVER_CLIENT_ID:      ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:  ${{ secrets.NAVER_CLIENT_SECRET }}

      # ── 이메일 발송 (push 트리거 경로: MD 파일이 이미 있을 때) ────────────
      - name: 이메일 발송 (Claude 루틴 경로)
        if: github.event_name == 'push'
        run: python scripts/send_stock_email.py
        env:
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAILS:    ${{ secrets.RECIPIENT_EMAILS }}
          SITE_BASE_URL:       ${{ secrets.SITE_BASE_URL }}
          SITE_THEME:          ${{ secrets.SITE_THEME }}

      # ── 티커 이력 업데이트 (모든 경로 공통) ──────────────────────────────────
      - name: 티커 이력 업데이트
        run: python scripts/update_history.py
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}

      # ── HTML 빌드 (모든 경로 공통) ─────────────────────────────────────────
      - name: 주식 시황 HTML 빌드
        run: python scripts/build_stock_site.py
        env:
          SITE_THEME:    ${{ secrets.SITE_THEME }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}

      # ── 뉴스 사이트도 함께 빌드 (통합 배포) ───────────────────────────────
      - name: 뉴스 사이트 HTML 빌드
        run: python scripts/build_site.py
        env:
          SITE_THEME:    ${{ secrets.SITE_THEME }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}

      # ── 커밋 + 푸시 ────────────────────────────────────────────────────────
      - name: 리포트 + 사이트 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "actions@github.com"
          git add reports/stock/ reports/history/ publish/
          git diff --staged --quiet || \
            git commit -m "📊 Stock build $(date +'%Y-%m-%d')"
          git push

      # ── GitHub Pages 배포 ──────────────────────────────────────────────────
      - name: GitHub Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/

      - name: GitHub Pages 배포
        id: deploy
        uses: actions/deploy-pages@v4

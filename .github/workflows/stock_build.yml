name: Stock Briefing Build

# ── 트리거 ──────────────────────────────────────────────────────────────────
# 주 경로: Claude Code 루틴이 stock MD 파일을 push 하면 자동 실행
# 백업 경로: 매주 월~금 KST 23:00 (UTC 14:00) 스케줄 — 루틴 미실행 시에만 가동
# 수동: workflow_dispatch 로 언제든지 실행 가능
#
# 배포 흐름:
#   루틴(수집+분석+MD저장+push) → 이 워크플로우(빌드+Pages 배포)
#                                → stock_send.yml(익일 08:00 KST 이메일·Notion·텔레그램)

on:
  push:
    branches:
      - main
    paths:
      - 'reports/stock/**.md'   # Claude 루틴이 MD 파일 push 시 자동 실행
  schedule:
    - cron: '0 14 * * 1-5'     # UTC 14:00 = KST 23:00 (월~금, 루틴 실패 시 백업)
  workflow_dispatch:
    inputs:
      mode:
        description: 'build_only (HTML만) | full (수집+분석+빌드)'
        required: false
        default: 'build_only'

# Pages 배포 동시 경합 방지
concurrency:
  group: pages-deploy
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  stock_build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # push 트리거 시 최신 커밋 포함

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      # ── 오늘 리포트 존재 여부 확인 (백업 경로 조건 분기용) ───────────────────
      - name: 오늘 리포트 존재 여부 확인
        id: check_md
        run: |
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          MD_PATH="reports/stock/stock_${TODAY}.md"
          if [ ! -f "$MD_PATH" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "오늘 MD 파일 없음 — 백업 경로 실행"
          else
            # MD 파일이 있어도 핵심 요약이 비어있으면 재분석 필요
            ANALYSIS_OK=$(python3 -c "import re; md=open('$MD_PATH').read(); m=re.search(r'## ■ 핵심 요약.*?\n\n(.+)', md, re.DOTALL); print('true' if m and m.group(1).strip()[:3] not in ('','---') else 'false')" 2>/dev/null || echo "false")
            if [ "$ANALYSIS_OK" = "true" ]; then
              echo "exists=true" >> $GITHUB_OUTPUT
              echo "오늘 MD 파일 존재 + 분석 내용 확인 — 백업 경로 건너뜀"
            else
              echo "exists=false" >> $GITHUB_OUTPUT
              echo "오늘 MD 파일 존재하나 분석 내용 비어있음 — 백업 경로 실행"
            fi
          fi

      # ── 백업 자동화 경로 (스케줄 or full 모드, 오늘 MD 없을 때만) ──────────
      - name: 주식 데이터 수집 및 리포트 생성 (백업 경로)
        if: |
          steps.check_md.outputs.exists == 'false' && (
            github.event_name == 'schedule' ||
            (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'full'))
        run: python scripts/stock_main.py
        env:
          LLM_PROVIDER:         ${{ secrets.LLM_PROVIDER }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          NAVER_CLIENT_ID:      ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:  ${{ secrets.NAVER_CLIENT_SECRET }}
          SITE_BASE_URL:        ${{ secrets.SITE_BASE_URL }}

      # ── 티커 이력 업데이트 (모든 경로 공통) ──────────────────────────────────
      - name: 티커 이력 업데이트
        run: python scripts/update_history.py
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}

      # ── HTML 빌드 (모든 경로 공통) ─────────────────────────────────────────
      - name: 주식 시황 HTML 빌드
        run: python scripts/build_stock_site.py
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}

      # ── 뉴스 사이트도 함께 빌드 (통합 배포) ───────────────────────────────
      - name: 뉴스 사이트 HTML 빌드
        run: python scripts/build_site.py --from $(date +'%Y-%m-%d')
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}

      # ── 이메일·Notion·텔레그램 발송은 stock_send.yml (익일 08:00 KST) 에서 처리 ──

      # ── 커밋 + 푸시 ────────────────────────────────────────────────────────
      - name: 리포트 + 사이트 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "actions@github.com"
          git add reports/stock/ reports/history/
          git add -f publish/stock/20??-??-??.html 2>/dev/null || true
          git add -f publish/stock/index.html publish/stock/archive.html \
                     publish/stock/stock-data.json publish/stock/data.json 2>/dev/null || true
          git add -f publish/app.html publish/index.html publish/archive.html \
                     publish/reports.json publish/reports-data.json 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "📊 Stock build $(date +'%Y-%m-%d') [skip ci]"
          git pull --rebase --autostash -X theirs origin main
          git push

      # ── GitHub Pages 배포 ──────────────────────────────────────────────────
      - name: GitHub Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/

      - name: GitHub Pages 배포
        id: deploy
        uses: actions/deploy-pages@v4

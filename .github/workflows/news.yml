name: Daily News Report

on:
  schedule:
    - cron: '15 18 * * *'   # UTC :15 = KST :15 (혼잡 피하고 이른 아침 전송)
  workflow_dispatch:
    inputs:
      mode:
        description: 'normal (오늘 수집+분석+발송) | reanalyze (특정 날짜 재분석, 발송 없음)'
        required: false
        default: 'normal'
      target_date:
        description: '재분석 날짜 (reanalyze 모드 전용, 예: 2026-06-01). 미입력 시 오늘'
        required: false

# Pages 배포 동시 경합 방지
concurrency:
  group: pages-deploy
  cancel-in-progress: false

# GitHub Pages 배포에 필요한 권한
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      # ── 일반 모드: 오늘 뉴스 수집 + 분석 + 발송 ─────────────────────────────
      - name: 뉴스 수집 및 리포트 생성
        if: ${{ github.event.inputs.mode != 'reanalyze' }}
        run: python main.py
        env:
          LLM_PROVIDER:        ${{ secrets.LLM_PROVIDER }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAILS:    ${{ secrets.RECIPIENT_EMAILS }}
          UNSUBSCRIBE_SECRET:  ${{ secrets.UNSUBSCRIBE_SECRET }}
          SITE_BASE_URL:       ${{ secrets.SITE_BASE_URL }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}

      # ── 재분석 모드: 기존 MD 재분석 + HTML 재빌드 (발송 없음) ──────────────
      - name: 뉴스 재분석 (reanalyze 모드)
        if: ${{ github.event.inputs.mode == 'reanalyze' }}
        run: |
          DATE="${{ github.event.inputs.target_date }}"
          if [ -z "$DATE" ]; then DATE=$(date +'%Y-%m-%d'); fi
          echo "재분석 대상: $DATE"
          python scripts/reanalyze.py --date $DATE
        env:
          LLM_PROVIDER:   ${{ secrets.LLM_PROVIDER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SITE_BASE_URL:  ${{ secrets.SITE_BASE_URL }}

      # ── 사이트 빌드 ────────────────────────────────────────────────────────
      - name: 사이트 빌드 (MD → HTML)
        if: ${{ github.event.inputs.mode != 'reanalyze' }}
        run: python scripts/build_site.py --from $(date +'%Y-%m-%d')
        # 테마/디자인 변경 시: 아래로 교체
        # run: python scripts/build_site.py --all

      - name: Notion 뉴스 동기화
        if: ${{ github.event.inputs.mode != 'reanalyze' }}
        run: python scripts/sync_notion.py --type news --date $(TZ=Asia/Seoul date +'%Y-%m-%d')
        env:
          NOTION_API_KEY:          ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID_NEWS: ${{ secrets.NOTION_DATABASE_ID_NEWS }}

      - name: 리포트 + 사이트 + DB 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "actions@github.com"
          git add reports/
          # 날짜별 HTML·JSON — 와일드카드를 사용하여 타임존 롤오버 버그 방지
          git add -f publish/news/20??-??-??.html publish/news/20??-??-??.json 2>/dev/null || true
          # Vercel 필수 정적 파일 (항상 최신 상태 유지)
          git add -f publish/app.html publish/index.html publish/archive.html \
                     publish/reports.json publish/reports-data.json 2>/dev/null || true
          git add -f publish/stock/ 2>/dev/null || true
          if [ "${{ github.event.inputs.mode }}" = "reanalyze" ]; then
            DATE="${{ github.event.inputs.target_date }}"
            if [ -z "$DATE" ]; then DATE=$(date +'%Y-%m-%d'); fi
            MSG="♻️ Reanalyze $DATE [skip ci]"
          else
            MSG="📰 Daily report $(date +'%Y-%m-%d') [skip ci]"
          fi
          git diff --staged --quiet || git commit -m "$MSG"
          git pull --rebase --autostash origin main
          git push

      - name: GitHub Pages 배포
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      # ── Vercel 강제 프로덕션 배포 (Vercel Git Integration + Output Directory: publish 로 대체)
      # - name: Vercel 프로덕션 강제 배포
      #   run: npx vercel --token=${{ secrets.VERCEL_TOKEN }} --prod --yes
      #   env:
      #     VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      #     VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

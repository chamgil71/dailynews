name: Daily News Report

on:
  schedule:
    - cron: '15 18 * * *'   # UTC :15 = KST :15 (혼잡 피하고 이른 아침 전송)
  workflow_dispatch:
    inputs:
      mode:
        description: 'normal (오늘 수집+분석+발송) | reanalyze (특정 날짜 재분석, 발송 없음)'
        required: false
        default: 'normal'
      target_date:
        description: '재분석 날짜 (reanalyze 모드 전용, 예: 2026-06-01). 미입력 시 오늘'
        required: false
      reanalyze_mode:
        description: 'smart (실패 항목만, 기본) | full (날짜 전체 초기화)'
        required: false
        default: 'smart'

# Pages 배포 동시 경합 방지
concurrency:
  group: pages-deploy
  cancel-in-progress: false

# GitHub Pages 배포에 필요한 권한
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      # ── 일반 모드: 오늘 뉴스 수집 + 분석 + MD/JSON 저장 ────────────────────
      # 이메일·텔레그램은 HTML 빌드·배포 완료 후 별도 스텝에서 실행
      - name: 뉴스 수집 및 리포트 생성
        if: ${{ github.event.inputs.mode != 'reanalyze' }}
        run: python main.py
        env:
          LLM_PROVIDER:        ${{ secrets.LLM_PROVIDER }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          UNSUBSCRIBE_SECRET:  ${{ secrets.UNSUBSCRIBE_SECRET }}
          SITE_BASE_URL:       ${{ secrets.SITE_BASE_URL }}

      # ── 재분석 모드: 기존 MD 재분석 + HTML 재빌드 (발송 없음) ──────────────
      - name: 뉴스 재분석 (reanalyze 모드)
        if: ${{ github.event.inputs.mode == 'reanalyze' }}
        run: |
          DATE="${{ github.event.inputs.target_date }}"
          if [ -z "$DATE" ]; then DATE=$(date +'%Y-%m-%d'); fi
          RMODE="${{ github.event.inputs.reanalyze_mode }}"
          if [ -z "$RMODE" ]; then RMODE="smart"; fi
          echo "재분석 대상: $DATE  mode: $RMODE"
          python scripts/reanalyze.py --date $DATE --mode $RMODE
        env:
          LLM_PROVIDER:   ${{ secrets.LLM_PROVIDER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SITE_BASE_URL:  ${{ secrets.SITE_BASE_URL }}

      # ── 품질 게이트 ────────────────────────────────────────────────────────
      # 이메일/텔레그램(send_email.py·send_telegram.py)은 이미 analysis_ok 플래그로
      # 발송을 막고 있는데, 사이트 빌드·배포만 이 체크가 없어 분석 실패해도
      # 깨진 콘텐츠가 그대로 배포되는 빈틈이 있었음 — 동일 기준으로 차단.
      - name: 분석 결과 확인
        if: ${{ github.event.inputs.mode != 'reanalyze' }}
        id: check_analysis
        run: |
          DATE=$(date +'%Y-%m-%d')
          JSON="reports/news_${DATE}.json"
          if [ -f "$JSON" ] && python -c "import json,sys; d=json.load(open('$JSON')); sys.exit(0 if d.get('analysis_ok', True) else 1)"; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::analysis_ok=False — 사이트 빌드·Notion 동기화 건너뜀 (관리자 알림은 run_news.py에서 별도 발송)"
          fi

      # ── 사이트 빌드 ────────────────────────────────────────────────────────
      - name: 사이트 빌드 (MD → HTML)
        if: ${{ github.event.inputs.mode != 'reanalyze' && steps.check_analysis.outputs.ok != 'false' }}
        run: python scripts/build_site.py --from $(date +'%Y-%m-%d')
        # 테마/디자인 변경 시: 아래로 교체
        # run: python scripts/build_site.py --all

      - name: Notion 뉴스 동기화
        if: ${{ github.event.inputs.mode != 'reanalyze' && steps.check_analysis.outputs.ok != 'false' }}
        run: python scripts/sync_notion.py --type news --date $(TZ=Asia/Seoul date +'%Y-%m-%d')
        env:
          NOTION_API_KEY:          ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID_NEWS: ${{ secrets.NOTION_DATABASE_ID_NEWS }}
        continue-on-error: true

      - name: 리포트 + 사이트 + DB 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "actions@github.com"
          git add reports/
          # 날짜별 HTML·JSON — 와일드카드를 사용하여 타임존 롤오버 버그 방지
          git add -f publish/news/20??-??-??.html publish/news/20??-??-??.json 2>/dev/null || true
          # Vercel 필수 정적 파일 (항상 최신 상태 유지)
          # publish/reports.json, publish/reports-data.json은 레거시 — 존재하지 않으므로 제거
          # 파일별로 분리하여 누락 파일이 있어도 이후 파일이 스테이징되도록 보장
          git add -f publish/app.html     2>/dev/null || true
          git add -f publish/index.html   2>/dev/null || true
          git add -f publish/archive.html 2>/dev/null || true
          git add -f publish/search-index.json 2>/dev/null || true
          git add -f publish/news/data.json 2>/dev/null || true
          # stock 파일 — 파일별 단독 라인으로 분리 (다중 파일 || true 패턴은 앞 파일 에러 시 뒤 파일 누락 위험)
          git add -f publish/stock/20??-??-??.html  2>/dev/null || true
          git add -f publish/stock/data.json         2>/dev/null || true
          git add -f publish/stock/index.html        2>/dev/null || true
          git add -f publish/stock/archive.html      2>/dev/null || true
          git add -f publish/stock/stock-data.json   2>/dev/null || true
          if [ "${{ github.event.inputs.mode }}" = "reanalyze" ]; then
            DATE="${{ github.event.inputs.target_date }}"
            if [ -z "$DATE" ]; then DATE=$(date +'%Y-%m-%d'); fi
            MSG="♻️ Reanalyze $DATE"
          else
            MSG="📰 Daily report $(date +'%Y-%m-%d')"
          fi
          git diff --staged --quiet || git commit -m "$MSG"
          git pull --rebase --autostash -X theirs origin main
          git push

      - name: GitHub Pages 배포
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      # ── 이메일 발송 (배포 완료 후) ────────────────────────────────────────────
      - name: 이메일 발송
        if: ${{ github.event.inputs.mode != 'reanalyze' }}
        run: python scripts/send_email.py --type news --date $(TZ=Asia/Seoul date +'%Y-%m-%d')
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAILS:   ${{ secrets.RECIPIENT_EMAILS }}
          UNSUBSCRIBE_SECRET: ${{ secrets.UNSUBSCRIBE_SECRET }}
          SITE_BASE_URL:      ${{ secrets.SITE_BASE_URL }}
        continue-on-error: true

      # ── 텔레그램 발송 (배포 완료 후) ──────────────────────────────────────────
      - name: 텔레그램 발송
        if: ${{ github.event.inputs.mode != 'reanalyze' }}
        run: python scripts/send_telegram.py --type news --date $(TZ=Asia/Seoul date +'%Y-%m-%d')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          SITE_BASE_URL:      ${{ secrets.SITE_BASE_URL }}
        continue-on-error: true

      # ── Vercel 강제 프로덕션 배포 (Vercel Git Integration + Output Directory: publish 로 대체)
      # - name: Vercel 프로덕션 강제 배포
      #   run: npx vercel --token=${{ secrets.VERCEL_TOKEN }} --prod --yes
      #   env:
      #     VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      #     VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── 파이프라인 모니터링 알림 (성공/실패 무관 항상 실행) ──────────────────
      - name: 파이프라인 결과 알림
        if: always() && github.event.inputs.mode != 'reanalyze'
        run: |
          STATUS="${{ job.status }}"
          [ "$STATUS" = "success" ] && STATUS_ARG="success" || STATUS_ARG="failure"
          python scripts/notify_pipeline.py \
            --type news \
            --status $STATUS_ARG \
            --date $(TZ=Asia/Seoul date +'%Y-%m-%d')
        env:
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_MONITOR: ${{ secrets.TELEGRAM_CHAT_ID_MONITOR }}
          TELEGRAM_CHAT_ID:        ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true

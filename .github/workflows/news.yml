name: Daily News Report

on:
  schedule:
    - cron: '0 02 * * *'   # UTC 02:00 = KST 11:00
  workflow_dispatch:

# GitHub Pages 배포에 필요한 권한
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 뉴스 수집 및 리포트 생성
        run: python main.py
        env:
          LLM_PROVIDER:        ${{ secrets.LLM_PROVIDER }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAILS:    ${{ secrets.RECIPIENT_EMAILS }}
          UNSUBSCRIBE_SECRET:  ${{ secrets.UNSUBSCRIBE_SECRET }}
          SITE_BASE_URL:       ${{ secrets.SITE_BASE_URL }}

      - name: 사이트 빌드 (MD → HTML)
        run: python scripts/build_site.py
        env:
          THEME_NEWS: editorial

      - name: 리포트 + 사이트 + DB 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "actions@github.com"
          git add reports/ storage/
          # 날짜별 HTML (gitignore 대상이므로 -f 강제 추가)
          git add -f publish/$(date +'%Y-%m-%d').html 2>/dev/null || true
          # Vercel 필수 정적 파일 (항상 최신 상태 유지)
          git add -f publish/app.html publish/index.html publish/archive.html \
                     publish/reports.json publish/reports-data.json 2>/dev/null || true
          git add -f publish/stock/ 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "📰 Daily report $(date +'%Y-%m-%d')"
          git push

      - name: GitHub Pages 배포
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

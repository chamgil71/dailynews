name: Card News — Build & SNS Post

# ── 트리거 ──────────────────────────────────────────────────────────────────
on:
  # 뉴스 워크플로우 성공 완료 후 자동 실행
  workflow_run:
    workflows: ["Daily News Report"]
    types: [completed]
  # 수동 실행
  workflow_dispatch:
    inputs:
      date:
        description: '날짜 (YYYY-MM-DD). 미입력 시 최신'
        required: false
      platforms:
        description: '발송 플랫폼 (쉼표 구분): instagram,telegram,twitter'
        required: false
        default: 'instagram,telegram'
      build_only:
        description: 'true: PNG만 생성, SNS 발송 건너뜀'
        required: false
        default: 'false'

concurrency:
  group: cardnews-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-post:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      # ── 한국어 폰트 + Playwright ───────────────────────────────────────────
      - name: 한국어 폰트 설치
        run: |
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk fonts-noto-cjk-extra
          fc-cache -f

      - name: Playwright 설치
        run: |
          pip install playwright
          playwright install chromium --with-deps

      # ── 카드뉴스 HTML 빌드 ─────────────────────────────────────────────────
      - name: 카드뉴스 HTML 빌드
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -n "$DATE" ]; then
            python scripts/build_cardnews.py --date "$DATE"
          else
            python scripts/build_cardnews.py
          fi
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}

      # ── PNG 이미지 생성 (Playwright → Noto Sans KR 렌더링) ─────────────────
      - name: PNG 이미지 생성
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -n "$DATE" ]; then
            python scripts/generate_cardnews_images.py --date "$DATE"
          else
            python scripts/generate_cardnews_images.py
          fi

      # ── PNG + HTML 커밋 & 푸시 (raw URL로 Instagram API 접근) ───────────────
      - name: 카드뉴스 파일 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f publish/cardnews/
          git diff --staged --quiet || git commit -m "🖼️ Card news $(date +'%Y-%m-%d') [skip ci]"
          git pull --rebase --autostash -X ours origin main
          git push

      # ── SNS 발송 (멀티 플랫폼) ────────────────────────────────────────────
      - name: SNS 발송
        if: ${{ github.event.inputs.build_only != 'true' }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          PLATFORMS="${{ github.event.inputs.platforms }}"
          if [ -z "$PLATFORMS" ]; then PLATFORMS="instagram,telegram"; fi

          ARGS="--platform $PLATFORMS"
          if [ -n "$DATE" ]; then ARGS="$ARGS --date $DATE"; fi

          python scripts/post_cardnews.py $ARGS
        env:
          # Instagram
          INSTAGRAM_ACCESS_TOKEN:        ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          # Telegram (기존)
          TELEGRAM_BOT_TOKEN:            ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:              ${{ secrets.TELEGRAM_CHAT_ID }}
          # Twitter/X
          TWITTER_API_KEY:               ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:            ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:          ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET:   ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          # 공통
          SITE_BASE_URL:                 ${{ secrets.SITE_BASE_URL }}
        continue-on-error: true

name: Card News — Build & Instagram Post

# ── 트리거 ──────────────────────────────────────────────────────────────────
on:
  # 뉴스 워크플로우 성공 완료 후 자동 실행
  workflow_run:
    workflows: ["Daily News Report"]
    types: [completed]
  # 수동 실행 (날짜 지정 가능)
  workflow_dispatch:
    inputs:
      date:
        description: '날짜 (YYYY-MM-DD). 미입력 시 최신 날짜'
        required: false
      skip_instagram:
        description: 'true: PNG 생성만, Instagram 포스팅 건너뜀'
        required: false
        default: 'false'

concurrency:
  group: cardnews-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-post:
    runs-on: ubuntu-latest
    # workflow_run 트리거 시 뉴스 워크플로우가 성공한 경우에만 실행
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 최신 push 포함 (news.yml이 push한 reports-data.json 포함)
          ref: main
          fetch-depth: 1

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      # ── 한국어 폰트 설치 (Pillow PNG 렌더링용) ──────────────────────────────
      - name: 한국어 폰트 설치
        run: |
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk fonts-noto-cjk-extra
          fc-cache -f

      # ── 카드뉴스 HTML 빌드 ──────────────────────────────────────────────────
      - name: 카드뉴스 HTML 빌드
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -n "$DATE" ]; then
            python scripts/build_cardnews.py --date "$DATE"
          else
            python scripts/build_cardnews.py
          fi
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}

      # ── PNG 이미지 생성 (Playwright) ─────────────────────────────────────────
      - name: PNG 이미지 생성
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -n "$DATE" ]; then
            python scripts/generate_cardnews_images.py --date "$DATE"
          else
            python scripts/generate_cardnews_images.py
          fi

      # ── PNG + HTML 커밋 & 푸시 ────────────────────────────────────────────
      - name: 카드뉴스 파일 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f publish/cardnews/
          git diff --staged --quiet || git commit -m "🖼️ Card news $(date +'%Y-%m-%d') [skip ci]"
          git pull --rebase --autostash -X ours origin main
          git push

      # ── Instagram 포스팅 ─────────────────────────────────────────────────
      # PNG를 main에 push한 후 GitHub raw URL로 접근 가능
      - name: Instagram 카루셀 포스팅
        if: ${{ github.event.inputs.skip_instagram != 'true' }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -n "$DATE" ]; then
            python scripts/post_instagram.py --date "$DATE"
          else
            python scripts/post_instagram.py
          fi
        env:
          INSTAGRAM_ACCESS_TOKEN:        ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
        continue-on-error: true
